<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLL Player Map App</title>
  <style>
    :root {
      --bg: #0b1118;
      --panel: #101a24;
      --line: #223042;
      --text: #dbe4f0;
      --muted: #8ea2bb;
      --accent: #5ac8fa;
      --warn: #ffb347;
      --red: #ff5f5f;
      --blue: #58a6ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .top {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #0e151f;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }
    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .row:last-child { margin-bottom: 0; }
    input, select, button {
      background: #0a1018;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
    }
    input { flex: 1; min-width: 0; }
    button { cursor: pointer; }
    .small { font-size: 12px; color: var(--muted); }
    .status { font-size: 12px; color: var(--warn); }

    .main {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
      padding: 12px;
      height: calc(100vh - 178px);
    }
    .map-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }
    .map-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
    }
    canvas {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0b121b;
      min-height: 0;
    }
    .right {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      min-height: 0;
    }
    .hover-box .name { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
    .hover-box .meta { font-size: 12px; color: var(--muted); }
    .events, .roster { overflow: auto; min-height: 0; max-height: 100%; }
    .event { font-size: 12px; padding: 4px 0; border-bottom: 1px solid #1a2533; }
    .event:last-child { border-bottom: 0; }
    .roster-item {
      font-size: 12px;
      padding: 5px 0;
      border-bottom: 1px solid #1a2533;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }
    .tag { font-size: 11px; color: var(--muted); }
    .team-allies { color: var(--blue); }
    .team-axis { color: var(--red); }
  </style>
</head>
<body>
  <div class="top">
    <div class="card">
      <div class="row">
        <input id="liveStatsUrl" placeholder="Live stats URL (optional if team view URL provided)" />
      </div>
      <div class="row">
        <input id="teamViewUrl" placeholder="Team view URL (required)" />
      </div>
      <div class="row">
        <input id="gamestateUrl" placeholder="Gamestate URL (optional)" />
      </div>
      <div class="row">
        <input id="cookie" placeholder="Cookie header value (for closed endpoints)" />
      </div>
      <div class="row">
        <input id="pollMs" placeholder="Poll interval ms (e.g. 2000)" style="max-width:180px" />
        <input id="mapXMin" placeholder="xMin" style="max-width:110px" />
        <input id="mapXMax" placeholder="xMax" style="max-width:110px" />
        <input id="mapYMin" placeholder="yMin" style="max-width:110px" />
        <input id="mapYMax" placeholder="yMax" style="max-width:110px" />
        <button id="saveCfgBtn">Save Config</button>
        <button id="testLiveBtn">Test Live</button>
      </div>
    </div>
    <div class="card">
      <div class="row">
        <button id="liveModeBtn">Live Mode</button>
        <button id="replayModeBtn">Replay Mode</button>
        <span class="small" id="modeLabel">Mode: LIVE</span>
      </div>
      <div class="row">
        <button id="startRecBtn">Start Recording</button>
        <button id="stopRecBtn">Stop Recording</button>
        <span class="small" id="recStatus">Recording: OFF</span>
      </div>
      <div class="row">
        <select id="replaySelect" style="flex:1"></select>
        <button id="loadReplayBtn">Load Replay</button>
      </div>
      <div class="row">
        <button id="playBtn">Play</button>
        <button id="pauseBtn">Pause</button>
        <input id="timeline" type="range" min="0" max="0" value="0" />
      </div>
      <div class="status" id="status">Ready.</div>
    </div>
  </div>

  <div class="main">
    <div class="map-wrap">
      <div class="map-head">
        <div id="mapName">UNKNOWN MAP</div>
        <div id="frameInfo">No frame loaded</div>
      </div>
      <canvas id="mapCanvas"></canvas>
    </div>
    <div class="right">
      <div class="card hover-box">
        <div class="name" id="hoverName">Hover a player dot</div>
        <div class="meta" id="hoverMeta">Role / Team / Squad / K:D</div>
      </div>
      <div class="card events">
        <div class="tag">Recent actions</div>
        <div id="events"></div>
      </div>
      <div class="card roster">
        <div class="tag">Players this frame</div>
        <div id="roster"></div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const MAP_VISUAL_EXTENSIONS = ["webp", "png", "jpg", "jpeg"];
    const MAP_LAYER_WORDS = new Set([
      "warfare",
      "offensive",
      "skirmish",
      "night",
      "day",
      "dusk",
      "dawn",
      "rain",
      "snow",
      "clear",
      "us",
      "usa",
      "ger",
      "germany",
      "british",
      "soviet",
      "axis",
      "allies",
    ]);
    const state = {
      mode: "live",
      liveTimer: null,
      replayTimer: null,
      frame: null,
      replayFrames: [],
      replayIndex: 0,
      projected: [],
      events: [],
      lastFrame: null,
      autoBoundsByMap: {},
      mapVisual: { key: "", status: "idle", img: null, src: "" },
      mapVisualCache: {},
    };

    async function api(path, options = {}) {
      const r = await fetch(path, options);
      const j = await r.json().catch(() => ({}));
      if (!r.ok || j.ok === false) throw new Error(j.error || `HTTP ${r.status}`);
      return j;
    }

    function setStatus(msg) { $("status").textContent = msg; }

    function getCfgFromInputs() {
      const mapBounds = getMapBoundsFromInputs(true);
      return {
        live_stats_url: $("liveStatsUrl").value.trim(),
        team_view_url: $("teamViewUrl").value.trim(),
        gamestate_url: $("gamestateUrl").value.trim(),
        cookie: $("cookie").value.trim(),
        poll_interval_ms: Number($("pollMs").value || 2000),
        map_bounds: mapBounds || {},
      };
    }

    function normalizeBounds(raw) {
      if (!raw || typeof raw !== "object") return null;
      const xMin = Number(raw.x_min);
      const xMax = Number(raw.x_max);
      const yMin = Number(raw.y_min);
      const yMax = Number(raw.y_max);
      if (![xMin, xMax, yMin, yMax].every(Number.isFinite)) return null;
      if (xMax <= xMin || yMax <= yMin) return null;
      return { xMin, xMax, yMin, yMax };
    }

    function setMapBoundsInputs(rawBounds) {
      const b = normalizeBounds(rawBounds);
      $("mapXMin").value = b ? String(b.xMin) : "";
      $("mapXMax").value = b ? String(b.xMax) : "";
      $("mapYMin").value = b ? String(b.yMin) : "";
      $("mapYMax").value = b ? String(b.yMax) : "";
    }

    function getMapBoundsFromInputs(strict = false) {
      const sxMin = $("mapXMin").value.trim();
      const sxMax = $("mapXMax").value.trim();
      const syMin = $("mapYMin").value.trim();
      const syMax = $("mapYMax").value.trim();

      if (!sxMin && !sxMax && !syMin && !syMax) return null;

      const xMin = Number(sxMin);
      const xMax = Number(sxMax);
      const yMin = Number(syMin);
      const yMax = Number(syMax);
      const valid = [xMin, xMax, yMin, yMax].every(Number.isFinite) && xMax > xMin && yMax > yMin;

      if (!valid) {
        if (strict) {
          throw new Error("Map bounds invalid. Set xMin/xMax/yMin/yMax with max > min, or clear all four.");
        }
        return null;
      }

      return { x_min: xMin, x_max: xMax, y_min: yMin, y_max: yMax };
    }

    async function loadConfig() {
      const j = await api("/api/config");
      const c = j.config || {};
      $("liveStatsUrl").value = c.live_stats_url || "";
      $("teamViewUrl").value = c.team_view_url || "";
      $("gamestateUrl").value = c.gamestate_url || "";
      $("cookie").value = c.cookie || "";
      $("pollMs").value = c.poll_interval_ms || 2000;
      setMapBoundsInputs(c.map_bounds || null);
    }

    async function saveConfig() {
      const cfg = getCfgFromInputs();
      await api("/api/config", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(cfg),
      });
      setStatus("Config saved.");
    }

    function diffEvents(prevFrame, currFrame) {
      if (!prevFrame || !currFrame) return [];
      const prev = new Map((prevFrame.players || []).map(p => [p.name, p]));
      const events = [];
      for (const p of (currFrame.players || [])) {
        const old = prev.get(p.name);
        if (!old) continue;
        const dk = Number(p.kills || 0) - Number(old.kills || 0);
        const dd = Number(p.deaths || 0) - Number(old.deaths || 0);
        if (dk > 0) events.push(`${p.name} +${dk} kills`);
        if (dd > 0) events.push(`${p.name} died ${dd}x`);
      }
      return events;
    }

    function addEvents(events) {
      if (!events.length) return;
      state.events = [...events, ...state.events].slice(0, 60);
      $("events").innerHTML = state.events.map(e => `<div class="event">${e}</div>`).join("");
    }

    function dedupe(values) {
      return [...new Set(values.filter(Boolean))];
    }

    function normalizeMapSlug(raw) {
      return String(raw || "")
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    function trimLayerWordsFromSlug(slug) {
      const parts = normalizeMapSlug(slug).split("_").filter(Boolean);
      while (parts.length > 1 && MAP_LAYER_WORDS.has(parts[parts.length - 1])) {
        parts.pop();
      }
      return parts.join("_");
    }

    function getMapSlugCandidates(frame) {
      const byImage = normalizeMapSlug(frame.map_image_name);
      const byShort = normalizeMapSlug(frame.map_shortname);
      const byName = normalizeMapSlug(frame.map_name);
      const trimmedName = trimLayerWordsFromSlug(frame.map_name);
      return dedupe([byImage, byShort, trimmedName, byName]);
    }

    function getMapVisualPathCandidates(frame) {
      const slugs = getMapSlugCandidates(frame);
      const out = [];
      for (const slug of slugs) {
        for (const ext of MAP_VISUAL_EXTENSIONS) {
          out.push(`/maps/${slug}.${ext}`);
        }
      }
      return dedupe(out);
    }

    function getMapVisualStatus() {
      const status = state.mapVisual.status;
      if (status === "ready" && state.mapVisual.src) return `visual:${state.mapVisual.src}`;
      if (status === "loading") return "visual:loading";
      if (status === "missing") return "visual:missing";
      return "visual:off";
    }

    function resolveMapVisual(frame) {
      if (!frame || typeof frame !== "object") return;
      const key = [
        normalizeMapSlug(frame.map_image_name),
        normalizeMapSlug(frame.map_shortname),
        normalizeMapSlug(frame.map_name),
      ].join("|");
      if (state.mapVisual.key === key) return;

      const candidates = getMapVisualPathCandidates(frame);
      state.mapVisual = {
        key,
        status: candidates.length ? "loading" : "missing",
        img: null,
        src: "",
      };
      if (!candidates.length) return;

      const expectedKey = key;
      const tryLoad = (index) => {
        if (state.mapVisual.key !== expectedKey) return;
        if (index >= candidates.length) {
          state.mapVisual = { ...state.mapVisual, status: "missing", img: null, src: "" };
          if (state.frame) drawFrame(state.frame);
          return;
        }

        const src = candidates[index];
        const cached = state.mapVisualCache[src];
        if (cached && cached.ok && cached.img) {
          state.mapVisual = { ...state.mapVisual, status: "ready", img: cached.img, src };
          if (state.frame) drawFrame(state.frame);
          return;
        }
        if (cached && cached.ok === false) {
          tryLoad(index + 1);
          return;
        }

        const img = new Image();
        img.onload = () => {
          state.mapVisualCache[src] = { ok: true, img };
          if (state.mapVisual.key !== expectedKey) return;
          state.mapVisual = { ...state.mapVisual, status: "ready", img, src };
          if (state.frame) drawFrame(state.frame);
        };
        img.onerror = () => {
          state.mapVisualCache[src] = { ok: false, img: null };
          if (state.mapVisual.key !== expectedKey) return;
          tryLoad(index + 1);
        };
        img.src = src;
      };

      tryLoad(0);
    }

    function detectBounds(players) {
      let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
      let n = 0;
      for (const p of players) {
        const w = p.world_position;
        if (!w || typeof w.x !== "number" || typeof w.y !== "number") continue;
        xMin = Math.min(xMin, w.x); xMax = Math.max(xMax, w.x);
        yMin = Math.min(yMin, w.y); yMax = Math.max(yMax, w.y);
        n++;
      }
      if (n < 2) return null;
      const xp = (xMax - xMin) * 0.1 || 100;
      const yp = (yMax - yMin) * 0.1 || 100;
      return { xMin: xMin - xp, xMax: xMax + xp, yMin: yMin - yp, yMax: yMax + yp };
    }

    function outOfBoundsRatio(bounds, players) {
      if (!bounds) return 1;
      let valid = 0;
      let out = 0;
      for (const p of players || []) {
        const w = p.world_position;
        if (!w || typeof w.x !== "number" || typeof w.y !== "number") continue;
        valid++;
        if (w.x < bounds.xMin || w.x > bounds.xMax || w.y < bounds.yMin || w.y > bounds.yMax) {
          out++;
        }
      }
      if (!valid) return 1;
      return out / valid;
    }

    function mergeBounds(a, b) {
      if (!a) return b;
      if (!b) return a;
      return {
        xMin: Math.min(a.xMin, b.xMin),
        xMax: Math.max(a.xMax, b.xMax),
        yMin: Math.min(a.yMin, b.yMin),
        yMax: Math.max(a.yMax, b.yMax),
      };
    }

    function getRenderBounds(frame, players) {
      const explicit = normalizeBounds(frame.map_bounds || null);
      if (explicit) {
        const ratio = outOfBoundsRatio(explicit, players);
        if (players.length < 5 || ratio <= 0.35) {
          return { ...explicit, source: frame.map_bounds_source || "configured" };
        }
        // If most players sit outside explicit bounds, treat bounds as invalid and fall back.
        setStatus(`Configured/API bounds look invalid (${Math.round(ratio * 100)}% out of bounds). Using auto bounds.`);
      }

      const mapKey = String(frame.map_name || "UNKNOWN MAP").toUpperCase();
      const sample = detectBounds(players);
      const cached = state.autoBoundsByMap[mapKey] || null;
      const merged = mergeBounds(cached, sample);
      if (merged) {
        state.autoBoundsByMap[mapKey] = merged;
        return { ...merged, source: "auto" };
      }
      return null;
    }

    function getMapViewport(canvas, bounds) {
      const outerPad = 8;
      const availW = Math.max(1, canvas.width - outerPad * 2);
      const availH = Math.max(1, canvas.height - outerPad * 2);
      const imageAspect = state.mapVisual?.img ? (state.mapVisual.img.width / state.mapVisual.img.height) : 0;
      const boundsAspect = bounds ? ((bounds.xMax - bounds.xMin) / Math.max(1e-9, bounds.yMax - bounds.yMin)) : 0;
      const targetAspect = Number.isFinite(imageAspect) && imageAspect > 0
        ? imageAspect
        : (Number.isFinite(boundsAspect) && boundsAspect > 0 ? boundsAspect : (availW / availH));

      let w = availW;
      let h = w / targetAspect;
      if (h > availH) {
        h = availH;
        w = h * targetAspect;
      }
      const x = (canvas.width - w) / 2;
      const y = (canvas.height - h) / 2;
      return { x, y, w, h };
    }

    function project(v, min, max, size) {
      if (max === min) return size / 2;
      return ((v - min) / (max - min)) * size;
    }

    function drawFrame(frame) {
      state.frame = frame;
      $("mapName").textContent = frame.map_name || "UNKNOWN MAP";
      const ts = frame.ts_iso ? new Date(frame.ts_iso).toLocaleTimeString() : "n/a";
      const players = frame.players || [];
      const bounds = getRenderBounds(frame, players);
      const boundsSrc = bounds ? (bounds.source || "auto") : "none";
      $("frameInfo").textContent = `${players.length} players · ${ts} · bounds:${boundsSrc} · ${getMapVisualStatus()}`;

      const canvas = $("mapCanvas");
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(600, Math.floor(rect.width));
      canvas.height = Math.max(400, Math.floor(rect.height));
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const viewport = getMapViewport(canvas, bounds);

      if (state.mapVisual.status === "ready" && state.mapVisual.img) {
        ctx.save();
        ctx.globalAlpha = 0.55;
        ctx.drawImage(state.mapVisual.img, viewport.x, viewport.y, viewport.w, viewport.h);
        ctx.restore();
      }

      // grid
      ctx.strokeStyle = "rgba(255,255,255,0.07)";
      for (let x = viewport.x; x <= viewport.x + viewport.w; x += 64) {
        ctx.beginPath(); ctx.moveTo(x, viewport.y); ctx.lineTo(x, viewport.y + viewport.h); ctx.stroke();
      }
      for (let y = viewport.y; y <= viewport.y + viewport.h; y += 64) {
        ctx.beginPath(); ctx.moveTo(viewport.x, y); ctx.lineTo(viewport.x + viewport.w, y); ctx.stroke();
      }

      state.projected = [];
      if (!bounds) {
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.font = "14px Arial";
        ctx.fillText("No usable world_position/map bounds in this frame.", 16, 24);
        return;
      }

      for (const p of players) {
        const w = p.world_position;
        if (!w || typeof w.x !== "number" || typeof w.y !== "number") continue;
        const x = viewport.x + project(w.x, bounds.xMin, bounds.xMax, viewport.w);
        const y = viewport.y + project(w.y, bounds.yMin, bounds.yMax, viewport.h);
        const axis = String(p.team || "").toLowerCase().includes("axis");
        const color = axis ? "#ff5f5f" : "#58a6ff";
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        state.projected.push({ x, y, p });
      }
    }

    function renderRoster(frame) {
      const players = [...(frame.players || [])].sort((a, b) => (Number(b.kills || 0) - Number(a.kills || 0)));
      $("roster").innerHTML = players.map(p => {
        const teamClass = String(p.team || "").toLowerCase().includes("axis") ? "team-axis" : "team-allies";
        return `<div class="roster-item">
          <span class="${teamClass}">${p.name || "Unknown"} <span class="tag">(${p.role || "role?"})</span></span>
          <span class="tag">${p.kills || 0} / ${p.deaths || 0}</span>
        </div>`;
      }).join("");
    }

    function applyFrame(frame, prevOverride = null) {
      const prev = prevOverride !== null ? prevOverride : state.lastFrame;
      addEvents(diffEvents(prev, frame));
      resolveMapVisual(frame);
      drawFrame(frame);
      renderRoster(frame);
      state.lastFrame = frame;
    }

    async function pollLive() {
      try {
        const j = await api("/api/live");
        applyFrame(j.frame);
      } catch (e) {
        setStatus(`Live error: ${e.message}`);
      }
    }

    function stopLiveLoop() {
      if (state.liveTimer) clearInterval(state.liveTimer);
      state.liveTimer = null;
    }

    function startLiveLoop() {
      stopLiveLoop();
      const ms = Math.max(500, Number($("pollMs").value || 2000));
      state.liveTimer = setInterval(pollLive, ms);
    }

    async function refreshReplays() {
      const j = await api("/api/replays");
      const sel = $("replaySelect");
      const list = j.replays || [];
      sel.innerHTML = list.length
        ? list.map(r => `<option value="${r.id}">${r.id} (${r.frames} frames)</option>`).join("")
        : `<option value="">No recordings yet</option>`;
    }

    function setMode(mode) {
      state.mode = mode;
      $("modeLabel").textContent = `Mode: ${mode.toUpperCase()}`;
      if (mode === "live") {
        if (state.replayTimer) clearInterval(state.replayTimer);
        state.replayTimer = null;
        startLiveLoop();
      } else {
        stopLiveLoop();
      }
    }

    async function loadReplay() {
      const id = $("replaySelect").value;
      if (!id) return;
      const j = await api(`/api/replay?id=${encodeURIComponent(id)}`);
      state.replayFrames = j.frames || [];
      state.replayIndex = 0;
      $("timeline").max = Math.max(0, state.replayFrames.length - 1);
      $("timeline").value = 0;
      state.events = [];
      if (state.replayFrames.length) applyFrame(state.replayFrames[0], null);
      setMode("replay");
      setStatus(`Replay loaded: ${id}`);
    }

    function showReplayIndex(i) {
      if (!state.replayFrames.length) return;
      const idx = Math.max(0, Math.min(state.replayFrames.length - 1, i));
      state.replayIndex = idx;
      $("timeline").value = idx;
      const prev = idx > 0 ? state.replayFrames[idx - 1] : null;
      applyFrame(state.replayFrames[idx], prev);
    }

    function playReplay() {
      if (!state.replayFrames.length) return;
      if (state.replayTimer) clearInterval(state.replayTimer);
      state.replayTimer = setInterval(() => {
        const next = state.replayIndex + 1;
        if (next >= state.replayFrames.length) {
          clearInterval(state.replayTimer);
          state.replayTimer = null;
          return;
        }
        showReplayIndex(next);
      }, 500);
    }

    function pauseReplay() {
      if (state.replayTimer) clearInterval(state.replayTimer);
      state.replayTimer = null;
    }

    function bindCanvasHover() {
      const canvas = $("mapCanvas");
      canvas.addEventListener("mousemove", (ev) => {
        const rect = canvas.getBoundingClientRect();
        const mx = ev.clientX - rect.left;
        const my = ev.clientY - rect.top;
        let best = null;
        let bestDist = 9999;
        for (const node of state.projected) {
          const dx = node.x - mx;
          const dy = node.y - my;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < bestDist) { bestDist = d; best = node; }
        }
        if (!best || bestDist > 12) {
          $("hoverName").textContent = "Hover a player dot";
          $("hoverMeta").textContent = "Role / Team / Squad / K:D";
          return;
        }
        const p = best.p;
        $("hoverName").textContent = p.name || "Unknown";
        $("hoverMeta").textContent = `${p.role || "role?"} · ${p.team || "team?"} · ${p.squad || "squad?"} · K:${p.kills || 0} D:${p.deaths || 0}`;
      });
    }

    async function init() {
      bindCanvasHover();
      $("saveCfgBtn").onclick = async () => { try { await saveConfig(); } catch (e) { setStatus(e.message); } };
      $("testLiveBtn").onclick = async () => { try { await pollLive(); setStatus("Live fetch OK."); } catch (e) { setStatus(e.message); } };
      $("startRecBtn").onclick = async () => {
        try {
          const j = await api("/api/record/start", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
          $("recStatus").textContent = `Recording: ON (${j.id})`;
          await refreshReplays();
        } catch (e) { setStatus(e.message); }
      };
      $("stopRecBtn").onclick = async () => {
        try {
          await api("/api/record/stop", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
          $("recStatus").textContent = "Recording: OFF";
          await refreshReplays();
        } catch (e) { setStatus(e.message); }
      };
      $("liveModeBtn").onclick = () => setMode("live");
      $("replayModeBtn").onclick = () => setMode("replay");
      $("loadReplayBtn").onclick = async () => { try { await loadReplay(); } catch (e) { setStatus(e.message); } };
      $("playBtn").onclick = playReplay;
      $("pauseBtn").onclick = pauseReplay;
      $("timeline").oninput = (e) => showReplayIndex(Number(e.target.value));

      await loadConfig();
      await refreshReplays();
      setMode("live");
      pollLive();
    }

    init().catch(e => setStatus(e.message));
  </script>
</body>
</html>
