<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLL Player Map App</title>
  <style>
    :root {
      --bg: #0b1118;
      --panel: #101a24;
      --line: #223042;
      --text: #dbe4f0;
      --muted: #8ea2bb;
      --accent: #5ac8fa;
      --warn: #ffb347;
      --red: #ff5f5f;
      --blue: #58a6ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .top {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #0e151f;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }
    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .row:last-child { margin-bottom: 0; }
    input, select, button {
      background: #0a1018;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
    }
    input { flex: 1; min-width: 0; }
    button { cursor: pointer; }
    .small { font-size: 12px; color: var(--muted); }
    .status { font-size: 12px; color: var(--warn); }

    .main {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
      padding: 12px;
      height: calc(100vh - 178px);
    }
    .map-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }
    .map-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
    }
    canvas {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0b121b;
      min-height: 0;
    }
    .right {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      min-height: 0;
    }
    .hover-box .name { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
    .hover-box .meta { font-size: 12px; color: var(--muted); }
    .events, .roster { overflow: auto; min-height: 0; max-height: 100%; }
    .event { font-size: 12px; padding: 4px 0; border-bottom: 1px solid #1a2533; }
    .event:last-child { border-bottom: 0; }
    .roster-item {
      font-size: 12px;
      padding: 5px 0;
      border-bottom: 1px solid #1a2533;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }
    .tag { font-size: 11px; color: var(--muted); }
    .team-allies { color: var(--blue); }
    .team-axis { color: var(--red); }
  </style>
</head>
<body>
  <div class="top">
    <div class="card">
      <div class="row">
        <input id="liveStatsUrl" placeholder="Live stats URL (optional if team view URL provided)" />
      </div>
      <div class="row">
        <input id="teamViewUrl" placeholder="Team view URL (required)" />
      </div>
      <div class="row">
        <input id="gamestateUrl" placeholder="Gamestate URL (optional)" />
      </div>
      <div class="row">
        <input id="cookie" placeholder="Cookie header value (for closed endpoints)" />
      </div>
      <div class="row">
        <input id="pollMs" placeholder="Poll interval ms (e.g. 2000)" style="max-width:180px" />
        <input id="mapXMin" placeholder="xMin" style="max-width:110px" />
        <input id="mapXMax" placeholder="xMax" style="max-width:110px" />
        <input id="mapYMin" placeholder="yMin" style="max-width:110px" />
        <input id="mapYMax" placeholder="yMax" style="max-width:110px" />
        <button id="saveCfgBtn">Save Config</button>
        <button id="testLiveBtn">Test Live</button>
      </div>
      <div class="row">
        <label class="small"><input id="flipX" type="checkbox" /> flipX</label>
        <label class="small"><input id="flipY" type="checkbox" /> flipY</label>
        <label class="small"><input id="swapXY" type="checkbox" /> swapXY</label>
        <input id="scaleX" placeholder="scaleX (1.0)" style="max-width:120px" />
        <input id="scaleY" placeholder="scaleY (1.0)" style="max-width:120px" />
        <input id="offsetX" placeholder="offsetX (0)" style="max-width:120px" />
        <input id="offsetY" placeholder="offsetY (0)" style="max-width:120px" />
        <button id="autoCalibBtn">Auto Calibrate</button>
      </div>
    </div>
    <div class="card">
      <div class="row">
        <button id="liveModeBtn">Live Mode</button>
        <button id="replayModeBtn">Replay Mode</button>
        <span class="small" id="modeLabel">Mode: LIVE</span>
      </div>
      <div class="row">
        <button id="startRecBtn">Start Recording</button>
        <button id="stopRecBtn">Stop Recording</button>
        <span class="small" id="recStatus">Recording: OFF</span>
      </div>
      <div class="row">
        <select id="replaySelect" style="flex:1"></select>
        <button id="loadReplayBtn">Load Replay</button>
      </div>
      <div class="row">
        <button id="playBtn">Play</button>
        <button id="pauseBtn">Pause</button>
        <input id="timeline" type="range" min="0" max="0" value="0" />
      </div>
      <div class="status" id="status">Ready.</div>
    </div>
  </div>

  <div class="main">
    <div class="map-wrap">
      <div class="map-head">
        <div id="mapName">UNKNOWN MAP</div>
        <div id="frameInfo">No frame loaded</div>
      </div>
      <canvas id="mapCanvas"></canvas>
    </div>
    <div class="right">
      <div class="card hover-box">
        <div class="name" id="hoverName">Hover a player dot</div>
        <div class="meta" id="hoverMeta">Role / Team / Squad / K:D</div>
      </div>
      <div class="card events">
        <div class="tag">Recent actions</div>
        <div id="events"></div>
      </div>
      <div class="card roster">
        <div class="tag">Players this frame</div>
        <div id="roster"></div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const MAP_VISUAL_EXTENSIONS = ["webp", "png", "jpg", "jpeg"];
    const MAP_LAYER_WORDS = new Set([
      "warfare",
      "offensive",
      "skirmish",
      "night",
      "day",
      "dusk",
      "dawn",
      "rain",
      "snow",
      "clear",
      "us",
      "usa",
      "ger",
      "germany",
      "british",
      "soviet",
      "axis",
      "allies",
    ]);
    // HLL-specific geometry assumptions:
    // - playable area is square
    // - map images can include gray border around playable area
    const HLL_PLAYABLE_BORDER_RATIO = 400 / (1000 + 800); // ~0.2222 inset each side
    const HLL_USE_UNIFORM_SCALE = true;
    const MAP_SLUG_ALIASES = {
      utahbeach: "utah",
      utah_beach: "utah",
      omahabeach: "omaha",
      omaha_beach: "omaha",
      stmereeglise: "sme",
      st_mere_eglise: "sme",
      saintemereeglise: "sme",
      sainte_mere_eglise: "sme",
      stmariedumont: "smdm",
      st_marie_du_mont: "smdm",
      saintemariedumont: "smdm",
      sainte_marie_du_mont: "smdm",
      purpleheartlane: "phl",
      purple_heart_lane: "phl",
      hurtgenforest: "hurtgen",
      hurtgen_forest: "hurtgen",
      elalamein: "el_alamein",
      elsenbornridge: "elsenborn_ridge",
    };
    const state = {
      mode: "live",
      liveTimer: null,
      replayTimer: null,
      frame: null,
      replayFrames: [],
      replayIndex: 0,
      projected: [],
      events: [],
      lastFrame: null,
      autoBoundsByMap: {},
      mapVisual: { key: "", status: "idle", img: null, src: "", playableRect: null, playableRectSource: "none" },
      mapVisualCache: {},
      calibrationSamples: [],
    };

    async function api(path, options = {}) {
      const r = await fetch(path, options);
      const j = await r.json().catch(() => ({}));
      if (!r.ok || j.ok === false) throw new Error(j.error || `HTTP ${r.status}`);
      return j;
    }

    function setStatus(msg) { $("status").textContent = msg; }

    function getCfgFromInputs() {
      const mapBounds = getMapBoundsFromInputs(true);
      return {
        live_stats_url: $("liveStatsUrl").value.trim(),
        team_view_url: $("teamViewUrl").value.trim(),
        gamestate_url: $("gamestateUrl").value.trim(),
        cookie: $("cookie").value.trim(),
        poll_interval_ms: Number($("pollMs").value || 2000),
        map_bounds: mapBounds || {},
        projection: getProjectionFromInputs(true),
      };
    }

    function normalizeBounds(raw) {
      if (!raw || typeof raw !== "object") return null;
      const xMin = Number(raw.x_min);
      const xMax = Number(raw.x_max);
      const yMin = Number(raw.y_min);
      const yMax = Number(raw.y_max);
      if (![xMin, xMax, yMin, yMax].every(Number.isFinite)) return null;
      if (xMax <= xMin || yMax <= yMin) return null;
      return { xMin, xMax, yMin, yMax };
    }

    function setMapBoundsInputs(rawBounds) {
      const b = normalizeBounds(rawBounds);
      $("mapXMin").value = b ? String(b.xMin) : "";
      $("mapXMax").value = b ? String(b.xMax) : "";
      $("mapYMin").value = b ? String(b.yMin) : "";
      $("mapYMax").value = b ? String(b.yMax) : "";
    }

    function getMapBoundsFromInputs(strict = false) {
      const sxMin = $("mapXMin").value.trim();
      const sxMax = $("mapXMax").value.trim();
      const syMin = $("mapYMin").value.trim();
      const syMax = $("mapYMax").value.trim();

      if (!sxMin && !sxMax && !syMin && !syMax) return null;

      const xMin = Number(sxMin);
      const xMax = Number(sxMax);
      const yMin = Number(syMin);
      const yMax = Number(syMax);
      const valid = [xMin, xMax, yMin, yMax].every(Number.isFinite) && xMax > xMin && yMax > yMin;

      if (!valid) {
        if (strict) {
          throw new Error("Map bounds invalid. Set xMin/xMax/yMin/yMax with max > min, or clear all four.");
        }
        return null;
      }

      return { x_min: xMin, x_max: xMax, y_min: yMin, y_max: yMax };
    }

    async function loadConfig() {
      const j = await api("/api/config");
      const c = j.config || {};
      $("liveStatsUrl").value = c.live_stats_url || "";
      $("teamViewUrl").value = c.team_view_url || "";
      $("gamestateUrl").value = c.gamestate_url || "";
      $("cookie").value = c.cookie || "";
      $("pollMs").value = c.poll_interval_ms || 2000;
      setMapBoundsInputs(c.map_bounds || null);
      setProjectionInputs(c.projection || null);
    }

    async function saveConfig() {
      const cfg = getCfgFromInputs();
      await api("/api/config", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(cfg),
      });
      setStatus("Config saved.");
    }

    function diffEvents(prevFrame, currFrame) {
      if (!prevFrame || !currFrame) return [];
      const prev = new Map((prevFrame.players || []).map(p => [p.name, p]));
      const events = [];
      for (const p of (currFrame.players || [])) {
        const old = prev.get(p.name);
        if (!old) continue;
        const dk = Number(p.kills || 0) - Number(old.kills || 0);
        const dd = Number(p.deaths || 0) - Number(old.deaths || 0);
        if (dk > 0) events.push(`${p.name} +${dk} kills`);
        if (dd > 0) events.push(`${p.name} died ${dd}x`);
      }
      return events;
    }

    function addEvents(events) {
      if (!events.length) return;
      state.events = [...events, ...state.events].slice(0, 60);
      $("events").innerHTML = state.events.map(e => `<div class="event">${e}</div>`).join("");
    }

    function setProjectionInputs(raw) {
      const p = normalizeProjection(raw) || normalizeProjection({});
      $("flipX").checked = Boolean(p.flip_x);
      $("flipY").checked = Boolean(p.flip_y);
      $("swapXY").checked = Boolean(p.swap_xy);
      $("scaleX").value = String(p.scale_x);
      $("scaleY").value = String(p.scale_y);
      $("offsetX").value = String(p.offset_x);
      $("offsetY").value = String(p.offset_y);
    }

    function normalizeProjection(raw) {
      const input = (raw && typeof raw === "object") ? raw : {};
      const scaleX = Number(input.scale_x ?? 1);
      const scaleY = Number(input.scale_y ?? 1);
      const offsetX = Number(input.offset_x ?? 0);
      const offsetY = Number(input.offset_y ?? 0);
      if (![scaleX, scaleY, offsetX, offsetY].every(Number.isFinite)) return null;
      if (Math.abs(scaleX) < 1e-9 || Math.abs(scaleY) < 1e-9) return null;
      return {
        flip_x: Boolean(input.flip_x),
        flip_y: Boolean(input.flip_y),
        swap_xy: Boolean(input.swap_xy),
        scale_x: scaleX,
        scale_y: scaleY,
        offset_x: offsetX,
        offset_y: offsetY,
      };
    }

    function getProjectionFromInputs(strict = false) {
      const projection = normalizeProjection({
        flip_x: $("flipX").checked,
        flip_y: $("flipY").checked,
        swap_xy: $("swapXY").checked,
        scale_x: $("scaleX").value.trim() === "" ? 1 : $("scaleX").value,
        scale_y: $("scaleY").value.trim() === "" ? 1 : $("scaleY").value,
        offset_x: $("offsetX").value.trim() === "" ? 0 : $("offsetX").value,
        offset_y: $("offsetY").value.trim() === "" ? 0 : $("offsetY").value,
      });
      if (!projection) {
        if (strict) {
          throw new Error("Projection invalid. Use finite scale/offset values and non-zero scales.");
        }
        return null;
      }
      return projection;
    }

    function projectWorld(rawPos, frame) {
      if (!rawPos || typeof rawPos.x !== "number" || typeof rawPos.y !== "number") return null;
      if (rawPos.x === 0 && rawPos.y === 0) return null;
      const p = normalizeProjection(frame.projection || null) || normalizeProjection({});
      if (!p) return { x: rawPos.x, y: rawPos.y };
      let x = rawPos.x;
      let y = rawPos.y;
      if (p.swap_xy) {
        const t = x; x = y; y = t;
      }
      if (p.flip_x) x = -x;
      if (p.flip_y) y = -y;
      x = (x * p.scale_x) + p.offset_x;
      y = (y * p.scale_y) + p.offset_y;
      return { x, y };
    }

    function projectWorldWithProjection(rawPos, projection) {
      if (!rawPos || typeof rawPos.x !== "number" || typeof rawPos.y !== "number") return null;
      if (rawPos.x === 0 && rawPos.y === 0) return null;
      const p = normalizeProjection(projection || null) || normalizeProjection({});
      if (!p) return { x: rawPos.x, y: rawPos.y };
      let x = rawPos.x;
      let y = rawPos.y;
      if (p.swap_xy) {
        const t = x; x = y; y = t;
      }
      if (p.flip_x) x = -x;
      if (p.flip_y) y = -y;
      x = (x * p.scale_x) + p.offset_x;
      y = (y * p.scale_y) + p.offset_y;
      return { x, y };
    }

    function rgbToHsl(r, g, b) {
      const rn = r / 255;
      const gn = g / 255;
      const bn = b / 255;
      const max = Math.max(rn, gn, bn);
      const min = Math.min(rn, gn, bn);
      const l = (max + min) / 2;
      if (max === min) return { h: 0, s: 0, l };
      const d = max - min;
      const s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      return { h: 0, s, l };
    }

    function detectPlayableRectFromImage(img) {
      try {
        if (!img || !img.width || !img.height) return null;
        const maxSide = 512;
        const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
        const w = Math.max(32, Math.floor(img.width * scale));
        const h = Math.max(32, Math.floor(img.height * scale));
        const cv = document.createElement("canvas");
        cv.width = w;
        cv.height = h;
        const ctx = cv.getContext("2d", { willReadFrequently: true });
        ctx.drawImage(img, 0, 0, w, h);
        const data = ctx.getImageData(0, 0, w, h).data;

        let minX = w, maxX = -1, minY = h, maxY = -1;
        let active = 0;
        for (let y = 0; y < h; y += 2) {
          for (let x = 0; x < w; x += 2) {
            const i = (y * w + x) * 4;
            const a = data[i + 3];
            if (a < 8) continue;
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            const { s, l } = rgbToHsl(r, g, b);
            // Playable terrain tends to have more color variation than gray border regions.
            const isPlayable = (s > 0.08 && l > 0.08 && l < 0.95) || (l > 0.18 && l < 0.75 && s > 0.04);
            if (!isPlayable) continue;
            active++;
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
          }
        }

        if (active < 120 || maxX <= minX || maxY <= minY) return null;
        const rx = minX / w;
        const ry = minY / h;
        const rw = (maxX - minX) / w;
        const rh = (maxY - minY) / h;
        // Basic sanity clamp.
        if (rw < 0.35 || rh < 0.35 || rw > 0.98 || rh > 0.98) return null;
        return { x: rx, y: ry, w: rw, h: rh };
      } catch (_) {
        return null;
      }
    }

    function defaultHllPlayableRect() {
      const inset = HLL_PLAYABLE_BORDER_RATIO;
      const size = Math.max(0.05, 1 - inset * 2);
      return { x: inset, y: inset, w: size, h: size };
    }

    function quantile(sorted, q) {
      if (!sorted.length) return null;
      if (sorted.length === 1) return sorted[0];
      const pos = (sorted.length - 1) * q;
      const lo = Math.floor(pos);
      const hi = Math.ceil(pos);
      if (lo === hi) return sorted[lo];
      const t = pos - lo;
      return sorted[lo] * (1 - t) + sorted[hi] * t;
    }

    function getMapCalibrationKey(frame) {
      const short = normalizeMapSlug(frame?.map_shortname || "");
      const img = normalizeMapSlug(frame?.map_image_name || "");
      const name = normalizeMapSlug(frame?.map_name || "");
      return short || img || name || "unknown_map";
    }

    function isLikelyValidCalibrationPoint(pos) {
      if (!pos || typeof pos.x !== "number" || typeof pos.y !== "number") return false;
      if (!Number.isFinite(pos.x) || !Number.isFinite(pos.y)) return false;
      if (pos.x === 0 && pos.y === 0) return false;
      const maxAbs = 300000;
      if (Math.abs(pos.x) > maxAbs || Math.abs(pos.y) > maxAbs) return false;
      return true;
    }

    function recordCalibrationSample(frame) {
      if (!frame) return;
      const key = getMapCalibrationKey(frame);
      const points = (frame.players || [])
        .map(p => p?.world_position)
        .filter(isLikelyValidCalibrationPoint)
        .map(p => ({ x: p.x, y: p.y }));
      if (points.length < 6) return;
      const now = Number(frame.ts_unix) || (Date.now() / 1000);
      state.calibrationSamples.push({ key, ts: now, points });
      const keepAgeSeconds = 180;
      const keepMax = 120;
      state.calibrationSamples = state.calibrationSamples
        .filter(s => (now - s.ts) <= keepAgeSeconds)
        .slice(-keepMax);
    }

    function collectCalibrationPoints(frame) {
      const key = getMapCalibrationKey(frame);
      const now = Number(frame?.ts_unix) || (Date.now() / 1000);
      const fromWindow = state.calibrationSamples
        .filter(s => s.key === key && (now - s.ts) <= 180)
        .flatMap(s => s.points);
      const fromFrame = (frame?.players || [])
        .map(p => p?.world_position)
        .filter(isLikelyValidCalibrationPoint)
        .map(p => ({ x: p.x, y: p.y }));
      return [...fromWindow, ...fromFrame];
    }

    function estimateProjectionForFrame(frame) {
      const points = collectCalibrationPoints(frame);
      if (points.length < 18) return null;

      const explicitBounds = normalizeBounds(frame.map_bounds || null) || getMapBoundsFromInputs(false);
      const target = explicitBounds || detectBounds(points.map(p => ({ world_position: p })), { projection: normalizeProjection({}) });
      if (!target) return null;

      const candidates = [
        { flip_x: false, flip_y: true, swap_xy: false }, // Typical map image Y-axis inversion.
        { flip_x: false, flip_y: false, swap_xy: false },
        { flip_x: true, flip_y: false, swap_xy: false },
        { flip_x: true, flip_y: true, swap_xy: false },
        { flip_x: false, flip_y: true, swap_xy: true },
        { flip_x: false, flip_y: false, swap_xy: true },
        { flip_x: true, flip_y: false, swap_xy: true },
        { flip_x: true, flip_y: true, swap_xy: true },
      ];

      const txRange = target.xMax - target.xMin;
      const tyRange = target.yMax - target.yMin;
      if (txRange <= 0 || tyRange <= 0) return null;

      let best = null;

      for (const c of candidates) {
        const oriented = [];
        for (const p of points) {
          const v = projectWorldWithProjection(p, { ...c, scale_x: 1, scale_y: 1, offset_x: 0, offset_y: 0 });
          if (v) oriented.push(v);
        }
        if (oriented.length < 18) continue;

        const xs = oriented.map(v => v.x).sort((a, b) => a - b);
        const ys = oriented.map(v => v.y).sort((a, b) => a - b);
        const xLo = quantile(xs, 0.05);
        const xHi = quantile(xs, 0.95);
        const yLo = quantile(ys, 0.05);
        const yHi = quantile(ys, 0.95);
        if (![xLo, xHi, yLo, yHi].every(Number.isFinite)) continue;
        if (xHi <= xLo || yHi <= yLo) continue;

        let scaleX = txRange / (xHi - xLo);
        let scaleY = tyRange / (yHi - yLo);
        if (HLL_USE_UNIFORM_SCALE) {
          const uni = (scaleX + scaleY) / 2;
          scaleX = uni;
          scaleY = uni;
        }
        const proj = normalizeProjection({
          ...c,
          scale_x: scaleX,
          scale_y: scaleY,
          offset_x: target.xMin - (xLo * scaleX),
          offset_y: target.yMin - (yLo * scaleY),
        });
        if (!proj) continue;

        let inBounds = 0;
        let sx = 0;
        let sy = 0;
        for (const p of points) {
          const wp = projectWorldWithProjection(p, proj);
          if (!wp) continue;
          sx += wp.x;
          sy += wp.y;
          if (wp.x >= target.xMin && wp.x <= target.xMax && wp.y >= target.yMin && wp.y <= target.yMax) inBounds++;
        }
        const n = points.length;
        const inRatio = n ? (inBounds / n) : 0;
        const mx = sx / n;
        const my = sy / n;
        const cx = (target.xMin + target.xMax) / 2;
        const cy = (target.yMin + target.yMax) / 2;
        const centerErr = Math.sqrt(((mx - cx) / txRange) ** 2 + ((my - cy) / tyRange) ** 2);
        const anisotropy = Math.abs(Math.log(Math.abs(proj.scale_x / proj.scale_y)));

        // Prefer high in-bounds fits, centered cloud, and less axis distortion.
        let score = (inRatio * 5.0) - (centerErr * 1.2) - (anisotropy * 0.25);
        if (c.flip_y) score += 0.05;
        if (c.swap_xy) score -= 0.03;

        if (!best || score > best.score) {
          best = { score, proj, inRatio, sampleCount: n };
        }
      }

      return best;
    }

    function autoCalibrateProjection() {
      const frame = state.frame;
      if (!frame) {
        setStatus("Auto calibrate needs a live/replay frame first.");
        return;
      }
      const fit = estimateProjectionForFrame(frame);
      if (!fit || !fit.proj) {
        setStatus("Auto calibrate failed. Need more player data and usable map bounds.");
        return;
      }
      if (state.frame) state.frame.projection = fit.proj;
      setProjectionInputs(fit.proj);
      drawFrame(frame);
      renderRoster(frame);
      setStatus(`Auto calibration applied (in-bounds ~${Math.round(fit.inRatio * 100)}%, samples:${fit.sampleCount || "?"}). Click Save Config to persist.`);
    }

    function dedupe(values) {
      return [...new Set(values.filter(Boolean))];
    }

    function normalizeMapSlug(raw) {
      return String(raw || "")
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    function trimLayerWordsFromSlug(slug) {
      const parts = normalizeMapSlug(slug).split("_").filter(Boolean);
      while (parts.length > 1 && MAP_LAYER_WORDS.has(parts[parts.length - 1])) {
        parts.pop();
      }
      return parts.join("_");
    }

    function withNoUnderscoreVariant(slug) {
      const norm = normalizeMapSlug(slug);
      if (!norm) return [];
      const plain = norm.replace(/_/g, "");
      if (!plain || plain === norm) return [norm];
      return [norm, plain];
    }

    function expandAliasSlugs(slugs) {
      const out = [];
      for (const raw of slugs || []) {
        for (const variant of withNoUnderscoreVariant(raw)) {
          out.push(variant);
          const alias = MAP_SLUG_ALIASES[variant];
          if (alias) out.push(alias);
        }
      }
      return dedupe(out);
    }

    function getMapSlugCandidates(frame) {
      const byImage = normalizeMapSlug(frame.map_image_name);
      const byShort = normalizeMapSlug(frame.map_shortname);
      const byName = normalizeMapSlug(frame.map_name);
      const trimmedName = trimLayerWordsFromSlug(frame.map_name);
      return expandAliasSlugs([byImage, byShort, trimmedName, byName]);
    }

    function getMapVisualPathCandidates(frame) {
      const slugs = getMapSlugCandidates(frame);
      const out = [];
      for (const slug of slugs) {
        for (const ext of MAP_VISUAL_EXTENSIONS) {
          out.push(`/maps/${slug}.${ext}`);
        }
      }
      return dedupe(out);
    }

    function getMapVisualStatus() {
      const status = state.mapVisual.status;
      if (status === "ready" && state.mapVisual.src) {
        const pr = state.mapVisual.playableRectSource || "none";
        return `visual:${state.mapVisual.src} playable:${pr}`;
      }
      if (status === "loading") return "visual:loading";
      if (status === "missing") return "visual:missing";
      return "visual:off";
    }

    function resolveMapVisual(frame) {
      if (!frame || typeof frame !== "object") return;
      const key = [
        normalizeMapSlug(frame.map_image_name),
        normalizeMapSlug(frame.map_shortname),
        normalizeMapSlug(frame.map_name),
      ].join("|");
      if (state.mapVisual.key === key) return;

      const candidates = getMapVisualPathCandidates(frame);
      state.mapVisual = {
        key,
        status: candidates.length ? "loading" : "missing",
        img: null,
        src: "",
        playableRect: null,
        playableRectSource: "none",
      };
      if (!candidates.length) return;

      const expectedKey = key;
      const tryLoad = (index) => {
        if (state.mapVisual.key !== expectedKey) return;
        if (index >= candidates.length) {
          state.mapVisual = { ...state.mapVisual, status: "missing", img: null, src: "" };
          if (state.frame) drawFrame(state.frame);
          return;
        }

        const src = candidates[index];
        const cached = state.mapVisualCache[src];
        if (cached && cached.ok && cached.img) {
          state.mapVisual = { ...state.mapVisual, status: "ready", img: cached.img, src };
          if (!state.mapVisual.playableRect) {
            state.mapVisual.playableRect = detectPlayableRectFromImage(cached.img) || defaultHllPlayableRect();
            state.mapVisual.playableRectSource = state.mapVisual.playableRect ? "image" : "hll-default";
          }
          if (state.frame) drawFrame(state.frame);
          return;
        }
        if (cached && cached.ok === false) {
          tryLoad(index + 1);
          return;
        }

        const img = new Image();
        img.onload = () => {
          state.mapVisualCache[src] = { ok: true, img };
          if (state.mapVisual.key !== expectedKey) return;
          const detectedPlayable = detectPlayableRectFromImage(img) || defaultHllPlayableRect();
          state.mapVisual = {
            ...state.mapVisual,
            status: "ready",
            img,
            src,
            playableRect: detectedPlayable,
            playableRectSource: detectedPlayable ? "image" : "hll-default",
          };
          if (state.frame) drawFrame(state.frame);
        };
        img.onerror = () => {
          state.mapVisualCache[src] = { ok: false, img: null };
          if (state.mapVisual.key !== expectedKey) return;
          tryLoad(index + 1);
        };
        img.src = src;
      };

      tryLoad(0);
    }

    function detectBounds(players, frame) {
      let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
      let n = 0;
      for (const p of players) {
        const w = p.world_position;
        const wp = projectWorld(w, frame);
        if (!wp) continue;
        xMin = Math.min(xMin, wp.x); xMax = Math.max(xMax, wp.x);
        yMin = Math.min(yMin, wp.y); yMax = Math.max(yMax, wp.y);
        n++;
      }
      if (n < 2) return null;
      const xp = (xMax - xMin) * 0.1 || 100;
      const yp = (yMax - yMin) * 0.1 || 100;
      return { xMin: xMin - xp, xMax: xMax + xp, yMin: yMin - yp, yMax: yMax + yp };
    }

    function outOfBoundsRatio(bounds, players, frame) {
      if (!bounds) return 1;
      let valid = 0;
      let out = 0;
      for (const p of players || []) {
        const w = p.world_position;
        const wp = projectWorld(w, frame);
        if (!wp) continue;
        valid++;
        if (wp.x < bounds.xMin || wp.x > bounds.xMax || wp.y < bounds.yMin || wp.y > bounds.yMax) {
          out++;
        }
      }
      if (!valid) return 1;
      return out / valid;
    }

    function mergeBounds(a, b) {
      if (!a) return b;
      if (!b) return a;
      return {
        xMin: Math.min(a.xMin, b.xMin),
        xMax: Math.max(a.xMax, b.xMax),
        yMin: Math.min(a.yMin, b.yMin),
        yMax: Math.max(a.yMax, b.yMax),
      };
    }

    function getRenderBounds(frame, players) {
      const explicit = normalizeBounds(frame.map_bounds || null);
      if (explicit) {
        const ratio = outOfBoundsRatio(explicit, players, frame);
        if (players.length < 5 || ratio <= 0.35) {
          return { ...explicit, source: frame.map_bounds_source || "configured" };
        }
        // If most players sit outside explicit bounds, treat bounds as invalid and fall back.
        setStatus(`Configured/API bounds look invalid (${Math.round(ratio * 100)}% out of bounds). Using auto bounds.`);
      }

      const mapKey = String(frame.map_name || "UNKNOWN MAP").toUpperCase();
      const sample = detectBounds(players, frame);
      const cached = state.autoBoundsByMap[mapKey] || null;
      const merged = mergeBounds(cached, sample);
      if (merged) {
        state.autoBoundsByMap[mapKey] = merged;
        return { ...merged, source: "auto" };
      }
      return null;
    }

    function getMapViewport(canvas, bounds) {
      const outerPad = 8;
      const availW = Math.max(1, canvas.width - outerPad * 2);
      const availH = Math.max(1, canvas.height - outerPad * 2);
      const imageAspect = state.mapVisual?.img ? (state.mapVisual.img.width / state.mapVisual.img.height) : 0;
      const boundsAspect = bounds ? ((bounds.xMax - bounds.xMin) / Math.max(1e-9, bounds.yMax - bounds.yMin)) : 0;
      const targetAspect = Number.isFinite(imageAspect) && imageAspect > 0
        ? imageAspect
        : (Number.isFinite(boundsAspect) && boundsAspect > 0 ? boundsAspect : (availW / availH));

      let w = availW;
      let h = w / targetAspect;
      if (h > availH) {
        h = availH;
        w = h * targetAspect;
      }
      const x = (canvas.width - w) / 2;
      const y = (canvas.height - h) / 2;
      return { x, y, w, h };
    }

    function getPlayableViewport(imageViewport) {
      const r = state.mapVisual?.playableRect || defaultHllPlayableRect();
      return {
        x: imageViewport.x + (r.x * imageViewport.w),
        y: imageViewport.y + (r.y * imageViewport.h),
        w: imageViewport.w * r.w,
        h: imageViewport.h * r.h,
      };
    }

    function project(v, min, max, size) {
      if (max === min) return size / 2;
      return ((v - min) / (max - min)) * size;
    }

    function drawFrame(frame) {
      state.frame = frame;
      $("mapName").textContent = frame.map_name || "UNKNOWN MAP";
      const ts = frame.ts_iso ? new Date(frame.ts_iso).toLocaleTimeString() : "n/a";
      const players = frame.players || [];
      const bounds = getRenderBounds(frame, players);
      const boundsSrc = bounds ? (bounds.source || "auto") : "none";
      const projection = normalizeProjection(frame.projection || null) || normalizeProjection({});
      const projFlags = [];
      if (projection.flip_x) projFlags.push("flipX");
      if (projection.flip_y) projFlags.push("flipY");
      if (projection.swap_xy) projFlags.push("swapXY");
      const projInfo = `proj:${projFlags.join("+") || "none"} sx:${projection.scale_x} sy:${projection.scale_y} ox:${projection.offset_x} oy:${projection.offset_y}`;
      $("frameInfo").textContent = `${players.length} players · ${ts} · bounds:${boundsSrc} · ${getMapVisualStatus()} · ${projInfo}`;

      const canvas = $("mapCanvas");
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(600, Math.floor(rect.width));
      canvas.height = Math.max(400, Math.floor(rect.height));
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const viewport = getMapViewport(canvas, bounds);
      const playableViewport = getPlayableViewport(viewport);

      if (state.mapVisual.status === "ready" && state.mapVisual.img) {
        ctx.save();
        ctx.globalAlpha = 0.55;
        ctx.drawImage(state.mapVisual.img, viewport.x, viewport.y, viewport.w, viewport.h);
        ctx.restore();
      }

      // grid
      ctx.strokeStyle = "rgba(255,255,255,0.07)";
      for (let x = playableViewport.x; x <= playableViewport.x + playableViewport.w; x += 64) {
        ctx.beginPath(); ctx.moveTo(x, playableViewport.y); ctx.lineTo(x, playableViewport.y + playableViewport.h); ctx.stroke();
      }
      for (let y = playableViewport.y; y <= playableViewport.y + playableViewport.h; y += 64) {
        ctx.beginPath(); ctx.moveTo(playableViewport.x, y); ctx.lineTo(playableViewport.x + playableViewport.w, y); ctx.stroke();
      }

      state.projected = [];
      if (!bounds) {
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.font = "14px Arial";
        ctx.fillText("No usable world_position/map bounds in this frame.", 16, 24);
        return;
      }

      for (const p of players) {
        const w = p.world_position;
        const wp = projectWorld(w, frame);
        if (!wp) continue;
        const x = playableViewport.x + project(wp.x, bounds.xMin, bounds.xMax, playableViewport.w);
        const y = playableViewport.y + project(wp.y, bounds.yMin, bounds.yMax, playableViewport.h);
        const axis = String(p.team || "").toLowerCase().includes("axis");
        const color = axis ? "#ff5f5f" : "#58a6ff";
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        state.projected.push({ x, y, p });
      }
    }

    function renderRoster(frame) {
      const players = [...(frame.players || [])].sort((a, b) => (Number(b.kills || 0) - Number(a.kills || 0)));
      $("roster").innerHTML = players.map(p => {
        const teamClass = String(p.team || "").toLowerCase().includes("axis") ? "team-axis" : "team-allies";
        return `<div class="roster-item">
          <span class="${teamClass}">${p.name || "Unknown"} <span class="tag">(${p.role || "role?"})</span></span>
          <span class="tag">${p.kills || 0} / ${p.deaths || 0}</span>
        </div>`;
      }).join("");
    }

    function applyFrame(frame, prevOverride = null) {
      const prev = prevOverride !== null ? prevOverride : state.lastFrame;
      addEvents(diffEvents(prev, frame));
      recordCalibrationSample(frame);
      resolveMapVisual(frame);
      drawFrame(frame);
      renderRoster(frame);
      state.lastFrame = frame;
    }

    async function pollLive() {
      try {
        const j = await api("/api/live");
        applyFrame(j.frame);
      } catch (e) {
        setStatus(`Live error: ${e.message}`);
      }
    }

    function stopLiveLoop() {
      if (state.liveTimer) clearInterval(state.liveTimer);
      state.liveTimer = null;
    }

    function startLiveLoop() {
      stopLiveLoop();
      const ms = Math.max(500, Number($("pollMs").value || 2000));
      state.liveTimer = setInterval(pollLive, ms);
    }

    async function refreshReplays() {
      const j = await api("/api/replays");
      const sel = $("replaySelect");
      const list = j.replays || [];
      sel.innerHTML = list.length
        ? list.map(r => `<option value="${r.id}">${r.id} (${r.frames} frames)</option>`).join("")
        : `<option value="">No recordings yet</option>`;
    }

    function setMode(mode) {
      state.mode = mode;
      $("modeLabel").textContent = `Mode: ${mode.toUpperCase()}`;
      if (mode === "live") {
        if (state.replayTimer) clearInterval(state.replayTimer);
        state.replayTimer = null;
        startLiveLoop();
      } else {
        stopLiveLoop();
      }
    }

    async function loadReplay() {
      const id = $("replaySelect").value;
      if (!id) return;
      const j = await api(`/api/replay?id=${encodeURIComponent(id)}`);
      state.replayFrames = j.frames || [];
      state.replayIndex = 0;
      $("timeline").max = Math.max(0, state.replayFrames.length - 1);
      $("timeline").value = 0;
      state.events = [];
      if (state.replayFrames.length) applyFrame(state.replayFrames[0], null);
      setMode("replay");
      setStatus(`Replay loaded: ${id}`);
    }

    function showReplayIndex(i) {
      if (!state.replayFrames.length) return;
      const idx = Math.max(0, Math.min(state.replayFrames.length - 1, i));
      state.replayIndex = idx;
      $("timeline").value = idx;
      const prev = idx > 0 ? state.replayFrames[idx - 1] : null;
      applyFrame(state.replayFrames[idx], prev);
    }

    function playReplay() {
      if (!state.replayFrames.length) return;
      if (state.replayTimer) clearInterval(state.replayTimer);
      state.replayTimer = setInterval(() => {
        const next = state.replayIndex + 1;
        if (next >= state.replayFrames.length) {
          clearInterval(state.replayTimer);
          state.replayTimer = null;
          return;
        }
        showReplayIndex(next);
      }, 500);
    }

    function pauseReplay() {
      if (state.replayTimer) clearInterval(state.replayTimer);
      state.replayTimer = null;
    }

    function bindCanvasHover() {
      const canvas = $("mapCanvas");
      canvas.addEventListener("mousemove", (ev) => {
        const rect = canvas.getBoundingClientRect();
        const mx = ev.clientX - rect.left;
        const my = ev.clientY - rect.top;
        let best = null;
        let bestDist = 9999;
        for (const node of state.projected) {
          const dx = node.x - mx;
          const dy = node.y - my;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < bestDist) { bestDist = d; best = node; }
        }
        if (!best || bestDist > 12) {
          $("hoverName").textContent = "Hover a player dot";
          $("hoverMeta").textContent = "Role / Team / Squad / K:D";
          return;
        }
        const p = best.p;
        $("hoverName").textContent = p.name || "Unknown";
        $("hoverMeta").textContent = `${p.role || "role?"} · ${p.team || "team?"} · ${p.squad || "squad?"} · K:${p.kills || 0} D:${p.deaths || 0}`;
      });
    }

    async function init() {
      bindCanvasHover();
      $("saveCfgBtn").onclick = async () => { try { await saveConfig(); } catch (e) { setStatus(e.message); } };
      $("testLiveBtn").onclick = async () => { try { await pollLive(); setStatus("Live fetch OK."); } catch (e) { setStatus(e.message); } };
      $("autoCalibBtn").onclick = () => { try { autoCalibrateProjection(); } catch (e) { setStatus(e.message); } };
      $("startRecBtn").onclick = async () => {
        try {
          const j = await api("/api/record/start", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
          $("recStatus").textContent = `Recording: ON (${j.id})`;
          await refreshReplays();
        } catch (e) { setStatus(e.message); }
      };
      $("stopRecBtn").onclick = async () => {
        try {
          await api("/api/record/stop", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
          $("recStatus").textContent = "Recording: OFF";
          await refreshReplays();
        } catch (e) { setStatus(e.message); }
      };
      $("liveModeBtn").onclick = () => setMode("live");
      $("replayModeBtn").onclick = () => setMode("replay");
      $("loadReplayBtn").onclick = async () => { try { await loadReplay(); } catch (e) { setStatus(e.message); } };
      $("playBtn").onclick = playReplay;
      $("pauseBtn").onclick = pauseReplay;
      $("timeline").oninput = (e) => showReplayIndex(Number(e.target.value));

      await loadConfig();
      await refreshReplays();
      setMode("live");
      pollLive();
    }

    init().catch(e => setStatus(e.message));
  </script>
</body>
</html>
