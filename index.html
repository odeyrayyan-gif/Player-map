<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLL Player Map App</title>
  <style>
    :root {
      --bg: #0b1118;
      --panel: #101a24;
      --line: #223042;
      --text: #dbe4f0;
      --muted: #8ea2bb;
      --accent: #5ac8fa;
      --warn: #ffb347;
      --red: #ff5f5f;
      --blue: #58a6ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .top {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #0e151f;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }
    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .row:last-child { margin-bottom: 0; }
    input, select, button {
      background: #0a1018;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
    }
    input { flex: 1; min-width: 0; }
    button { cursor: pointer; }
    .small { font-size: 12px; color: var(--muted); }
    .status { font-size: 12px; color: var(--warn); }

    .main {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
      padding: 12px;
      height: calc(100vh - 178px);
    }
    .map-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }
    .map-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
    }
    canvas {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0b121b;
      min-height: 0;
    }
    .right {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      min-height: 0;
    }
    .hover-box .name { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
    .hover-box .meta { font-size: 12px; color: var(--muted); }
    .events, .roster { overflow: auto; min-height: 0; max-height: 100%; }
    .event { font-size: 12px; padding: 4px 0; border-bottom: 1px solid #1a2533; }
    .event:last-child { border-bottom: 0; }
    .roster-item {
      font-size: 12px;
      padding: 5px 0;
      border-bottom: 1px solid #1a2533;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }
    .tag { font-size: 11px; color: var(--muted); }
    .team-allies { color: var(--blue); }
    .team-axis { color: var(--red); }
  </style>
</head>
<body>
  <div class="top">
    <div class="card">
      <div class="row">
        <input id="liveStatsUrl" placeholder="Live stats URL (optional if team view URL provided)" />
      </div>
      <div class="row">
        <input id="teamViewUrl" placeholder="Team view URL (required)" />
      </div>
      <div class="row">
        <input id="gamestateUrl" placeholder="Gamestate URL (optional)" />
      </div>
      <div class="row">
        <input id="cookie" placeholder="Cookie header value (for closed endpoints)" />
      </div>
      <div class="row">
        <input id="pollMs" placeholder="Poll interval ms (e.g. 2000)" style="max-width:180px" />
        <button id="saveCfgBtn">Save Config</button>
        <button id="testLiveBtn">Test Live</button>
      </div>
      <div class="row">
        <label class="small"><input id="flipMapX" type="checkbox" /> flipMapX</label>
        <label class="small"><input id="flipMapY" type="checkbox" /> flipMapY</label>
        <label class="small"><input id="mirrorPlayersX" type="checkbox" /> mirror players L/R</label>
        <label class="small"><input id="mirrorPlayersY" type="checkbox" /> mirror players U/D</label>
        <input id="alliesColor" placeholder="Allies color (#58a6ff)" style="max-width:150px" />
        <input id="axisColor" placeholder="Axis color (#ff5f5f)" style="max-width:150px" />
      </div>
    </div>
    <div class="card">
      <div class="row">
        <button id="liveModeBtn">Live Mode</button>
        <button id="replayModeBtn">Replay Mode</button>
        <span class="small" id="modeLabel">Mode: LIVE</span>
      </div>
      <div class="row">
        <button id="startRecBtn">Start Recording</button>
        <button id="stopRecBtn">Stop Recording</button>
        <span class="small" id="recStatus">Recording: OFF</span>
      </div>
      <div class="row">
        <select id="replaySelect" style="flex:1"></select>
        <button id="loadReplayBtn">Load Replay</button>
      </div>
      <div class="row">
        <button id="playBtn">Play</button>
        <button id="pauseBtn">Pause</button>
        <input id="timeline" type="range" min="0" max="0" value="0" />
      </div>
      <div class="status" id="status">Ready.</div>
    </div>
  </div>

  <div class="main">
    <div class="map-wrap">
      <div class="map-head">
        <div id="mapName">UNKNOWN MAP</div>
        <div id="frameInfo">No frame loaded</div>
      </div>
      <canvas id="mapCanvas"></canvas>
    </div>
    <div class="right">
      <div class="card hover-box">
        <div class="name" id="hoverName">Hover a player dot</div>
        <div class="meta" id="hoverMeta">Role / Team / Squad / K:D</div>
      </div>
      <div class="card events">
        <div class="tag">Recent actions</div>
        <div id="events"></div>
      </div>
      <div class="card roster">
        <div class="tag">Players this frame</div>
        <div id="roster"></div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const MAP_VISUAL_EXTENSIONS = ["webp", "png", "jpg", "jpeg"];
    const MAP_LAYER_WORDS = new Set([
      "warfare",
      "offensive",
      "skirmish",
      "night",
      "day",
      "dusk",
      "dawn",
      "rain",
      "snow",
      "clear",
      "us",
      "usa",
      "ger",
      "germany",
      "british",
      "soviet",
      "axis",
      "allies",
    ]);
    // HLL-specific geometry assumptions:
    // - world center is (0, 0)
    // - map spans 10x10 grid cells
    // - default full span is 100,000 world units (-50,000..50,000)
    // - map images can include gray border around playable area
    const HLL_PLAYABLE_BORDER_RATIO = 400 / (1000 + 800); // ~0.2222 inset each side
    const HLL_GRID_CELLS = 10;
    const HLL_WORLD_HALF = 50000;
    const HLL_WORLD_MIN = -HLL_WORLD_HALF;
    const HLL_WORLD_MAX = HLL_WORLD_HALF;
    const HLL_WORLD_SIZE = HLL_WORLD_MAX - HLL_WORLD_MIN;
    const HLL_STRIP_INSET_CELLS = 2;
    const HLL_MAP_PLAYABLE_GRID_PRESETS = {
      // St. Marie Du Mont:
      // - columns C..H playable (A/B and I/J are out)
      // - rows 1..10 playable
      smdm: { col_start: 3, col_end: 8, row_start: 1, row_end: 10 },
      stmariedumont: { col_start: 3, col_end: 8, row_start: 1, row_end: 10 },
      stmariedumont_day_webp: { col_start: 3, col_end: 8, row_start: 1, row_end: 10 },
    };
    // User-provided orientation presets:
    // - "horizontal" => top/bottom 2 rows unplayable (rows C..H playable)
    // - "vertical" => left/right 2 cols unplayable (cols 3..8 playable)
    const HLL_MAP_HORIZONTAL_SLUGS = new Set([
      "carentan",
      "elalamein",
      "el_alamein",
      "hill400",
      "hill_400",
      "hurtgen",
      "hurtgenforest",
      "hurtgen_forest",
      "mortain",
      "omaha",
      "omahabeach",
      "omaha_beach",
      "sme",
      "stmereeglise",
      "st_mere_eglise",
      "saintemereeglise",
      "sainte_mere_eglise",
      "stalingrad",
      "tobruk",
      "utah",
      "utahbeach",
      "utah_beach",
    ]);
    const HLL_MAP_VERTICAL_SLUGS = new Set([
      "driel",
      "elsenbornridge",
      "elsenborn_ridge",
      "foy",
      "kharkov",
      "kursk",
      "phl",
      "purpleheartlane",
      "purple_heart_lane",
      "remagen",
      "smdm",
      "stmariedumont",
      "st_marie_du_mont",
      "saintemariedumont",
      "sainte_marie_du_mont",
    ]);
    // Playable-area world bounds calibration from user-provided corner anchors:
    // - Horizontal sample map: Carentan (A3/J3/A8/J8)
    // - Vertical sample map: Remagen (C1/H1/C10/H10)
    // These are used as deterministic templates to avoid per-session stretch drift.
    const HLL_ORIENTATION_PLAYABLE_WORLD_BOUNDS = {
      // Centered on world origin (0,0) using user-provided corner anchors.
      // Horizontal anchors (Carentan A3/J3/A8/J8) imply these half-extents:
      //   xHalf=(|xMin|+|xMax|)/2 = 98454.4921875
      //   yHalf=(|yMin|+|yMax|)/2 = 60478.94140625
      horizontal: {
        xMin: -98454.4921875,
        xMax: 98454.4921875,
        yMin: -60478.94140625,
        yMax: 60478.94140625,
      },
      // Vertical anchors (Remagen C1/H1/C10/H10) imply these half-extents:
      //   xHalf=(|xMin|+|xMax|)/2 = 59517.09375
      //   yHalf=(|yMin|+|yMax|)/2 = 97104.99609375
      vertical: {
        xMin: -59517.09375,
        xMax: 59517.09375,
        yMin: -97104.99609375,
        yMax: 97104.99609375,
      },
    };
    const HLL_MAP_PLAYABLE_WORLD_BOUNDS_PRESETS = {
      carentan: HLL_ORIENTATION_PLAYABLE_WORLD_BOUNDS.horizontal,
      remagen: HLL_ORIENTATION_PLAYABLE_WORLD_BOUNDS.vertical,
    };
    // Player projection orientation presets for maps that need a hard lock.
    // This is separate from map image view flips.
    const HLL_MAP_PROJECTION_PRESETS = {
      // Keep player projection un-rotated unless explicitly overridden.
      sme: { flip_x: false, flip_y: false, swap_xy: false },
    };
    const MAP_SLUG_ALIASES = {
      utahbeach: "utah",
      utah_beach: "utah",
      omahabeach: "omaha",
      omaha_beach: "omaha",
      stmereeglise: "sme",
      st_mere_eglise: "sme",
      saintemereeglise: "sme",
      sainte_mere_eglise: "sme",
      stmariedumont: "smdm",
      st_marie_du_mont: "smdm",
      saintemariedumont: "smdm",
      sainte_marie_du_mont: "smdm",
      purpleheartlane: "phl",
      purple_heart_lane: "phl",
      hurtgenforest: "hurtgen",
      hurtgen_forest: "hurtgen",
      elalamein: "el_alamein",
      elsenbornridge: "elsenborn_ridge",
    };
    const state = {
      mode: "live",
      liveTimer: null,
      replayTimer: null,
      frame: null,
      replayFrames: [],
      replayIndex: 0,
      projected: [],
      events: [],
      lastFrame: null,
      mapVisual: { key: "", status: "idle", img: null, src: "", playableRect: null, playableRectSource: "none" },
      mapVisualCache: {},
    };

    async function api(path, options = {}) {
      const r = await fetch(path, options);
      const j = await r.json().catch(() => ({}));
      if (!r.ok || j.ok === false) throw new Error(j.error || `HTTP ${r.status}`);
      return j;
    }

    function setStatus(msg) { $("status").textContent = msg; }

    function getCfgFromInputs() {
      return {
        live_stats_url: $("liveStatsUrl").value.trim(),
        team_view_url: $("teamViewUrl").value.trim(),
        gamestate_url: $("gamestateUrl").value.trim(),
        cookie: $("cookie").value.trim(),
        poll_interval_ms: Number($("pollMs").value || 2000),
        map_bounds: {},
        projection: { flip_x: false, flip_y: false, swap_xy: false, scale_x: 1, scale_y: 1, offset_x: 0, offset_y: 0 },
        map_view: getMapViewFromInputs(),
        player_view: getPlayerViewFromInputs(),
        player_colors: getPlayerColorsFromInputs(),
      };
    }

    async function loadConfig() {
      const j = await api("/api/config");
      const c = j.config || {};
      $("liveStatsUrl").value = c.live_stats_url || "";
      $("teamViewUrl").value = c.team_view_url || "";
      $("gamestateUrl").value = c.gamestate_url || "";
      $("cookie").value = c.cookie || "";
      $("pollMs").value = c.poll_interval_ms || 2000;
      setMapViewInputs(c.map_view || null);
      setPlayerViewInputs(c.player_view || null);
      setPlayerColorsInputs(c.player_colors || null);
    }

    async function saveConfig() {
      const cfg = getCfgFromInputs();
      await api("/api/config", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(cfg),
      });
      setStatus("Config saved.");
    }

    function diffEvents(prevFrame, currFrame) {
      if (!prevFrame || !currFrame) return [];
      const prev = new Map((prevFrame.players || []).map(p => [p.name, p]));
      const events = [];
      for (const p of (currFrame.players || [])) {
        const old = prev.get(p.name);
        if (!old) continue;
        const dk = Number(p.kills || 0) - Number(old.kills || 0);
        const dd = Number(p.deaths || 0) - Number(old.deaths || 0);
        if (dk > 0) events.push(`${p.name} +${dk} kills`);
        if (dd > 0) events.push(`${p.name} died ${dd}x`);
      }
      return events;
    }

    function addEvents(events) {
      if (!events.length) return;
      state.events = [...events, ...state.events].slice(0, 60);
      $("events").innerHTML = state.events.map(e => `<div class="event">${e}</div>`).join("");
    }

    function normalizeMapView(raw) {
      const r = (raw && typeof raw === "object") ? raw : {};
      return {
        flip_x: Boolean(r.flip_x),
        flip_y: Boolean(r.flip_y),
      };
    }

    function setMapViewInputs(raw) {
      const mv = normalizeMapView(raw);
      $("flipMapX").checked = mv.flip_x;
      $("flipMapY").checked = mv.flip_y;
    }

    function getMapViewFromInputs() {
      return {
        flip_x: $("flipMapX").checked,
        flip_y: $("flipMapY").checked,
      };
    }


    function normalizePlayerView(raw) {
      const r = (raw && typeof raw === "object") ? raw : {};
      return {
        mirror_x: Boolean(r.mirror_x),
        mirror_y: Boolean(r.mirror_y),
      };
    }

    function setPlayerViewInputs(raw) {
      const pv = normalizePlayerView(raw);
      $("mirrorPlayersX").checked = pv.mirror_x;
      $("mirrorPlayersY").checked = pv.mirror_y;
    }

    function getPlayerViewFromInputs() {
      return {
        mirror_x: $("mirrorPlayersX").checked,
        mirror_y: $("mirrorPlayersY").checked,
      };
    }

    const DEFAULT_PLAYER_COLORS = { allies: "#58a6ff", axis: "#ff5f5f" };

    function normalizeHexColor(raw, fallback) {
      const s = String(raw || "").trim();
      if (/^#[0-9a-fA-F]{6}$/.test(s)) return s.toLowerCase();
      return fallback;
    }

    function normalizePlayerColors(raw) {
      const r = (raw && typeof raw === "object") ? raw : {};
      return {
        allies: normalizeHexColor(r.allies, DEFAULT_PLAYER_COLORS.allies),
        axis: normalizeHexColor(r.axis, DEFAULT_PLAYER_COLORS.axis),
      };
    }

    function isTankRole(role) {
      const r = String(role || "").toLowerCase();
      return r.includes("tank") || r.includes("armor") || r.includes("crewman");
    }

    function getSquadInitial(squad) {
      const text = String(squad || "").trim();
      if (!text) return "";
      const m = text.match(/[A-Za-z0-9]/);
      return m ? m[0].toUpperCase() : "";
    }

    function setPlayerColorsInputs(raw) {
      const c = normalizePlayerColors(raw);
      $("alliesColor").value = c.allies;
      $("axisColor").value = c.axis;
    }

    function getPlayerColorsFromInputs() {
      return normalizePlayerColors({
        allies: $("alliesColor").value,
        axis: $("axisColor").value,
      });
    }

    function projectWorld(rawPos, frame) {
      if (!rawPos || typeof rawPos.x !== "number" || typeof rawPos.y !== "number") return null;
      if (rawPos.x === 0 && rawPos.y === 0) return null;
      const pv = normalizePlayerView(frame?.player_view || null);
      let x = rawPos.x;
      let y = rawPos.y;
      if (pv.mirror_x) x = -x;
      if (pv.mirror_y) y = -y;
      return { x, y };
    }

    function isLikelyValidCalibrationPoint(pos) {
      if (!pos || typeof pos.x !== "number" || typeof pos.y !== "number") return false;
      if (!Number.isFinite(pos.x) || !Number.isFinite(pos.y)) return false;
      if (pos.x === 0 && pos.y === 0) return false;
      const maxAbs = 300000;
      if (Math.abs(pos.x) > maxAbs || Math.abs(pos.y) > maxAbs) return false;
      return true;
    }

    function collectCalibrationPoints(frame) {
      return (frame?.players || [])
        .map((p) => p?.world_position)
        .filter(isLikelyValidCalibrationPoint)
        .map((p) => ({ x: p.x, y: p.y }));
    }

    function rgbToHsl(r, g, b) {
      const rn = r / 255;
      const gn = g / 255;
      const bn = b / 255;
      const max = Math.max(rn, gn, bn);
      const min = Math.min(rn, gn, bn);
      const l = (max + min) / 2;
      if (max === min) return { h: 0, s: 0, l };
      const d = max - min;
      const s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      return { h: 0, s, l };
    }

    function detectPlayableRectFromImage(img) {
      try {
        if (!img || !img.width || !img.height) return null;
        const maxSide = 512;
        const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
        const w = Math.max(32, Math.floor(img.width * scale));
        const h = Math.max(32, Math.floor(img.height * scale));
        const cv = document.createElement("canvas");
        cv.width = w;
        cv.height = h;
        const ctx = cv.getContext("2d", { willReadFrequently: true });
        ctx.drawImage(img, 0, 0, w, h);
        const data = ctx.getImageData(0, 0, w, h).data;

        let minX = w, maxX = -1, minY = h, maxY = -1;
        let active = 0;
        for (let y = 0; y < h; y += 2) {
          for (let x = 0; x < w; x += 2) {
            const i = (y * w + x) * 4;
            const a = data[i + 3];
            if (a < 8) continue;
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            const { s, l } = rgbToHsl(r, g, b);
            // Playable terrain tends to have more color variation than gray border regions.
            const isPlayable = (s > 0.08 && l > 0.08 && l < 0.95) || (l > 0.18 && l < 0.75 && s > 0.04);
            if (!isPlayable) continue;
            active++;
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
          }
        }

        if (active < 120 || maxX <= minX || maxY <= minY) return null;
        const rx = minX / w;
        const ry = minY / h;
        const rw = (maxX - minX) / w;
        const rh = (maxY - minY) / h;
        // Basic sanity clamp.
        if (rw < 0.35 || rh < 0.35 || rw > 0.98 || rh > 0.98) return null;
        return { x: rx, y: ry, w: rw, h: rh };
      } catch (_) {
        return null;
      }
    }

    function getMapPlayableRectPreset(frame) {
      const preset = getPlayableGridPresetForFrame(frame);
      return playableRectFromGridPreset(preset);
    }

    function playableRectFromGridPreset(preset) {
      if (!preset || typeof preset !== "object") return null;
      const cs = Number(preset.col_start);
      const ce = Number(preset.col_end);
      const rs = Number(preset.row_start);
      const re = Number(preset.row_end);
      if (![cs, ce, rs, re].every(Number.isFinite)) return null;
      if (cs < 1 || ce > 10 || rs < 1 || re > 10) return null;
      if (ce < cs || re < rs) return null;
      const x = (cs - 1) / 10;
      const y = (rs - 1) / 10;
      const w = (ce - cs + 1) / 10;
      const h = (re - rs + 1) / 10;
      return { x, y, w, h };
    }

    function getPlayableGridPresetForFrame(frame) {
      const slugs = getMapSlugCandidates(frame);
      for (const slug of slugs) {
        const preset = HLL_MAP_PLAYABLE_GRID_PRESETS[slug];
        if (preset) return preset;
      }
      for (const slug of slugs) {
        if (HLL_MAP_HORIZONTAL_SLUGS.has(slug)) {
          // Rows C..H playable, all columns playable.
          return { col_start: 1, col_end: 10, row_start: 3, row_end: 8 };
        }
        if (HLL_MAP_VERTICAL_SLUGS.has(slug)) {
          // Columns 3..8 playable, all rows playable.
          return { col_start: 3, col_end: 8, row_start: 1, row_end: 10 };
        }
      }
      return null;
    }

    function getPlayableWorldBoundsPresetForFrame(frame) {
      const slugs = getMapSlugCandidates(frame);
      for (const slug of slugs) {
        const direct = HLL_MAP_PLAYABLE_WORLD_BOUNDS_PRESETS[slug];
        if (direct) return { ...direct };
      }
      for (const slug of slugs) {
        if (HLL_MAP_HORIZONTAL_SLUGS.has(slug)) {
          return { ...HLL_ORIENTATION_PLAYABLE_WORLD_BOUNDS.horizontal };
        }
        if (HLL_MAP_VERTICAL_SLUGS.has(slug)) {
          return { ...HLL_ORIENTATION_PLAYABLE_WORLD_BOUNDS.vertical };
        }
      }
      return null;
    }

    function defaultHllPlayableRect() {
      const inset = HLL_PLAYABLE_BORDER_RATIO;
      const size = Math.max(0.05, 1 - inset * 2);
      return { x: inset, y: inset, w: size, h: size };
    }

    function worldBoundsFromPlayableRect(rect) {
      if (!rect || typeof rect !== "object") return null;
      const x = Number(rect.x);
      const y = Number(rect.y);
      const w = Number(rect.w);
      const h = Number(rect.h);
      if (![x, y, w, h].every(Number.isFinite)) return null;
      if (w <= 0 || h <= 0) return null;
      const xMin = HLL_WORLD_MIN + (x * HLL_WORLD_SIZE);
      const xMax = HLL_WORLD_MIN + ((x + w) * HLL_WORLD_SIZE);
      const yMin = HLL_WORLD_MIN + (y * HLL_WORLD_SIZE);
      const yMax = HLL_WORLD_MIN + ((y + h) * HLL_WORLD_SIZE);
      if (![xMin, xMax, yMin, yMax].every(Number.isFinite)) return null;
      if (xMax <= xMin || yMax <= yMin) return null;
      return { xMin, xMax, yMin, yMax };
    }

    function estimateStripPlayableRectFromPoints(frame) {
      const points = collectCalibrationPoints(frame);
      if (!points || points.length < 24) return null;
      const xs = points.map(p => p.x).sort((a, b) => a - b);
      const ys = points.map(p => p.y).sort((a, b) => a - b);
      const xLo = quantile(xs, 0.1);
      const xHi = quantile(xs, 0.9);
      const yLo = quantile(ys, 0.1);
      const yHi = quantile(ys, 0.9);
      if (![xLo, xHi, yLo, yHi].every(Number.isFinite)) return null;
      if (xHi <= xLo || yHi <= yLo) return null;

      const xRange = xHi - xLo;
      const yRange = yHi - yLo;
      const stripSize = (HLL_GRID_CELLS - HLL_STRIP_INSET_CELLS * 2) / HLL_GRID_CELLS; // 0.6
      const stripInset = HLL_STRIP_INSET_CELLS / HLL_GRID_CELLS; // 0.2

      // If players span much wider than tall, we assume top/bottom border bars.
      if (xRange > yRange * 1.25) {
        return { rect: { x: 0, y: stripInset, w: 1, h: stripSize }, source: "points-strip-h" };
      }
      // If players span much taller than wide, we assume left/right border bars.
      if (yRange > xRange * 1.25) {
        return { rect: { x: stripInset, y: 0, w: stripSize, h: 1 }, source: "points-strip-v" };
      }
      return null;
    }

    function quantile(sorted, q) {
      if (!sorted.length) return null;
      if (sorted.length === 1) return sorted[0];
      const pos = (sorted.length - 1) * q;
      const lo = Math.floor(pos);
      const hi = Math.ceil(pos);
      if (lo === hi) return sorted[lo];
      const t = pos - lo;
      return sorted[lo] * (1 - t) + sorted[hi] * t;
    }

    function dedupe(values) {
      return [...new Set(values.filter(Boolean))];
    }

    function normalizeMapSlug(raw) {
      return String(raw || "")
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    function trimLayerWordsFromSlug(slug) {
      const parts = normalizeMapSlug(slug).split("_").filter(Boolean);
      while (parts.length > 1 && MAP_LAYER_WORDS.has(parts[parts.length - 1])) {
        parts.pop();
      }
      return parts.join("_");
    }

    function withNoUnderscoreVariant(slug) {
      const norm = normalizeMapSlug(slug);
      if (!norm) return [];
      const plain = norm.replace(/_/g, "");
      if (!plain || plain === norm) return [norm];
      return [norm, plain];
    }

    function expandAliasSlugs(slugs) {
      const out = [];
      for (const raw of slugs || []) {
        for (const variant of withNoUnderscoreVariant(raw)) {
          out.push(variant);
          const alias = MAP_SLUG_ALIASES[variant];
          if (alias) out.push(alias);
        }
      }
      return dedupe(out);
    }

    function getMapSlugCandidates(frame) {
      const byImage = normalizeMapSlug(frame.map_image_name);
      const byShort = normalizeMapSlug(frame.map_shortname);
      const byName = normalizeMapSlug(frame.map_name);
      const trimmedName = trimLayerWordsFromSlug(frame.map_name);
      return expandAliasSlugs([byImage, byShort, trimmedName, byName]);
    }

    function getMapVisualPathCandidates(frame) {
      const slugs = getMapSlugCandidates(frame);
      const out = [];
      for (const slug of slugs) {
        for (const ext of MAP_VISUAL_EXTENSIONS) {
          out.push(`/maps/${slug}.${ext}`);
        }
      }
      return dedupe(out);
    }

    function getMapVisualStatus() {
      const status = state.mapVisual.status;
      if (status === "ready" && state.mapVisual.src) {
        const pr = state.mapVisual.playableRectSource || "none";
        return `visual:${state.mapVisual.src} playable:${pr}`;
      }
      if (status === "loading") return "visual:loading";
      if (status === "missing") return "visual:missing";
      return "visual:off";
    }

    function resolveMapVisual(frame) {
      if (!frame || typeof frame !== "object") return;
      const key = [
        normalizeMapSlug(frame.map_image_name),
        normalizeMapSlug(frame.map_shortname),
        normalizeMapSlug(frame.map_name),
      ].join("|");
      if (state.mapVisual.key === key) return;

      const candidates = getMapVisualPathCandidates(frame);
      state.mapVisual = {
        key,
        status: candidates.length ? "loading" : "missing",
        img: null,
        src: "",
        playableRect: null,
        playableRectSource: "none",
      };
      if (!candidates.length) return;

      const expectedKey = key;
      const tryLoad = (index) => {
        if (state.mapVisual.key !== expectedKey) return;
        if (index >= candidates.length) {
          state.mapVisual = { ...state.mapVisual, status: "missing", img: null, src: "" };
          if (state.frame) drawFrame(state.frame);
          return;
        }

        const src = candidates[index];
        const cached = state.mapVisualCache[src];
        if (cached && cached.ok && cached.img) {
          state.mapVisual = { ...state.mapVisual, status: "ready", img: cached.img, src };
          if (!state.mapVisual.playableRect) {
            const presetPlayable = getMapPlayableRectPreset(frame);
            if (presetPlayable) {
              state.mapVisual.playableRect = presetPlayable;
              state.mapVisual.playableRectSource = "preset";
            } else {
              const stripPlayable = estimateStripPlayableRectFromPoints(frame);
              if (stripPlayable?.rect) {
                state.mapVisual.playableRect = stripPlayable.rect;
                state.mapVisual.playableRectSource = stripPlayable.source || "points-strip";
              } else {
                state.mapVisual.playableRect = detectPlayableRectFromImage(cached.img) || defaultHllPlayableRect();
                state.mapVisual.playableRectSource = state.mapVisual.playableRect ? "image" : "hll-default";
              }
            }
          }
          if (state.frame) drawFrame(state.frame);
          return;
        }
        if (cached && cached.ok === false) {
          tryLoad(index + 1);
          return;
        }

        const img = new Image();
        img.onload = () => {
          state.mapVisualCache[src] = { ok: true, img };
          if (state.mapVisual.key !== expectedKey) return;
          const presetPlayable = getMapPlayableRectPreset(frame);
          const stripPlayable = presetPlayable ? null : estimateStripPlayableRectFromPoints(frame);
          const detectedPlayable =
            presetPlayable ||
            stripPlayable?.rect ||
            detectPlayableRectFromImage(img) ||
            defaultHllPlayableRect();
          state.mapVisual = {
            ...state.mapVisual,
            status: "ready",
            img,
            src,
            playableRect: detectedPlayable,
            playableRectSource: presetPlayable
              ? "preset"
              : (stripPlayable?.source || (detectedPlayable ? "image" : "hll-default")),
          };
          if (state.frame) drawFrame(state.frame);
        };
        img.onerror = () => {
          state.mapVisualCache[src] = { ok: false, img: null };
          if (state.mapVisual.key !== expectedKey) return;
          tryLoad(index + 1);
        };
        img.src = src;
      };

      tryLoad(0);
    }

    function detectBounds(players, frame) {
      let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
      let n = 0;
      for (const p of players) {
        const w = p.world_position;
        const wp = projectWorld(w, frame);
        if (!wp) continue;
        xMin = Math.min(xMin, wp.x); xMax = Math.max(xMax, wp.x);
        yMin = Math.min(yMin, wp.y); yMax = Math.max(yMax, wp.y);
        n++;
      }
      if (n < 2) return null;
      const xp = (xMax - xMin) * 0.1 || 100;
      const yp = (yMax - yMin) * 0.1 || 100;
      return { xMin: xMin - xp, xMax: xMax + xp, yMin: yMin - yp, yMax: yMax + yp };
    }

    function outOfBoundsRatio(bounds, players, frame) {
      if (!bounds) return 1;
      let valid = 0;
      let out = 0;
      for (const p of players || []) {
        const w = p.world_position;
        const wp = projectWorld(w, frame);
        if (!wp) continue;
        valid++;
        if (wp.x < bounds.xMin || wp.x > bounds.xMax || wp.y < bounds.yMin || wp.y > bounds.yMax) {
          out++;
        }
      }
      if (!valid) return 1;
      return out / valid;
    }

    function mergeBounds(a, b) {
      if (!a) return b;
      if (!b) return a;
      return {
        xMin: Math.min(a.xMin, b.xMin),
        xMax: Math.max(a.xMax, b.xMax),
        yMin: Math.min(a.yMin, b.yMin),
        yMax: Math.max(a.yMax, b.yMax),
      };
    }

    function getRenderBounds(frame, players) {
      const playableWorldPreset = getPlayableWorldBoundsPresetForFrame(frame);
      if (playableWorldPreset) {
        return { ...playableWorldPreset, source: "hll-playable-preset" };
      }
      return {
        xMin: HLL_WORLD_MIN,
        xMax: HLL_WORLD_MAX,
        yMin: HLL_WORLD_MIN,
        yMax: HLL_WORLD_MAX,
        source: "hll-fixed",
      };
    }

    function getMapViewport(canvas, bounds) {
      const outerPad = 8;
      const availW = Math.max(1, canvas.width - outerPad * 2);
      const availH = Math.max(1, canvas.height - outerPad * 2);
      const imageAspect = state.mapVisual?.img ? (state.mapVisual.img.width / state.mapVisual.img.height) : 0;
      const boundsAspect = bounds ? ((bounds.xMax - bounds.xMin) / Math.max(1e-9, bounds.yMax - bounds.yMin)) : 0;
      const targetAspect = Number.isFinite(imageAspect) && imageAspect > 0
        ? imageAspect
        : (Number.isFinite(boundsAspect) && boundsAspect > 0 ? boundsAspect : (availW / availH));

      let w = availW;
      let h = w / targetAspect;
      if (h > availH) {
        h = availH;
        w = h * targetAspect;
      }
      const x = (canvas.width - w) / 2;
      const y = (canvas.height - h) / 2;
      return { x, y, w, h };
    }

    function getPlayableViewport(imageViewport) {
      const r = state.mapVisual?.playableRect || defaultHllPlayableRect();
      return {
        x: imageViewport.x + (r.x * imageViewport.w),
        y: imageViewport.y + (r.y * imageViewport.h),
        w: imageViewport.w * r.w,
        h: imageViewport.h * r.h,
      };
    }

    function project(v, min, max, size) {
      if (max === min) return size / 2;
      return ((v - min) / (max - min)) * size;
    }

    function getZoomState() {
      const z = state.zoom || { scale: 1, centerXNorm: 0.5, centerYNorm: 0.5 };
      const scale = Number.isFinite(z.scale) ? z.scale : 1;
      const centerXNorm = Number.isFinite(z.centerXNorm) ? z.centerXNorm : 0.5;
      const centerYNorm = Number.isFinite(z.centerYNorm) ? z.centerYNorm : 0.5;
      return {
        scale: Math.max(1, Math.min(3, scale)),
        centerXNorm: Math.max(0, Math.min(1, centerXNorm)),
        centerYNorm: Math.max(0, Math.min(1, centerYNorm)),
      };
    }

    function setZoomState(next) {
      const z = getZoomState();
      const merged = {
        scale: Number.isFinite(next?.scale) ? next.scale : z.scale,
        centerXNorm: Number.isFinite(next?.centerXNorm) ? next.centerXNorm : z.centerXNorm,
        centerYNorm: Number.isFinite(next?.centerYNorm) ? next.centerYNorm : z.centerYNorm,
      };
      state.zoom = {
        scale: Math.max(1, Math.min(3, merged.scale)),
        centerXNorm: Math.max(0, Math.min(1, merged.centerXNorm)),
        centerYNorm: Math.max(0, Math.min(1, merged.centerYNorm)),
      };
    }

    function applyZoomToViewport(vp) {
      const z = getZoomState();
      if (!vp || z.scale <= 1.0001) return vp;
      const newW = vp.w / z.scale;
      const newH = vp.h / z.scale;
      let x = vp.x + (z.centerXNorm * vp.w) - (newW / 2);
      let y = vp.y + (z.centerYNorm * vp.h) - (newH / 2);
      const minX = vp.x;
      const maxX = vp.x + vp.w - newW;
      const minY = vp.y;
      const maxY = vp.y + vp.h - newH;
      x = Math.max(minX, Math.min(maxX, x));
      y = Math.max(minY, Math.min(maxY, y));
      return { x, y, w: newW, h: newH };
    }


    function drawFrame(frame) {
      state.frame = frame;
      $("mapName").textContent = frame.map_name || "UNKNOWN MAP";
      const ts = frame.ts_iso ? new Date(frame.ts_iso).toLocaleTimeString() : "n/a";
      const players = frame.players || [];
      const bounds = getRenderBounds(frame, players);
      const boundsSrc = bounds ? (bounds.source || "auto") : "none";
      const mapView = normalizeMapView(frame.map_view || null);
      const playerView = normalizePlayerView(frame.player_view || null);
      const playerColors = normalizePlayerColors(frame.player_colors || null);
      const zoom = getZoomState();
      const projFlags = [];
      if (playerView.mirror_x) projFlags.push("mirrorX");
      if (playerView.mirror_y) projFlags.push("mirrorY");
      const mapViewFlags = [];
      if (mapView.flip_x) mapViewFlags.push("mapFlipX");
      if (mapView.flip_y) mapViewFlags.push("mapFlipY");
      const projInfo = `players:${projFlags.join("+") || "none"} view:${mapViewFlags.join("+") || "none"} zoom:${zoom.scale.toFixed(2)}x`;
      $("frameInfo").textContent = `${players.length} players · ${ts} · bounds:${boundsSrc} · ${getMapVisualStatus()} · ${projInfo}`;

      const canvas = $("mapCanvas");
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(600, Math.floor(rect.width));
      canvas.height = Math.max(400, Math.floor(rect.height));
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const viewport = getMapViewport(canvas, bounds);
      const zoomedViewport = applyZoomToViewport(viewport);
      const playableViewport = getPlayableViewport(zoomedViewport);

      if (state.mapVisual.status === "ready" && state.mapVisual.img) {
        ctx.save();
        if (mapView.flip_x || mapView.flip_y) {
          if (mapView.flip_x) {
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
          }
          if (mapView.flip_y) {
            ctx.translate(0, canvas.height);
            ctx.scale(1, -1);
          }
        }
        ctx.globalAlpha = 0.55;
        ctx.drawImage(state.mapVisual.img, zoomedViewport.x, zoomedViewport.y, zoomedViewport.w, zoomedViewport.h);
        ctx.restore();
      }

      // grid
      ctx.strokeStyle = "rgba(255,255,255,0.07)";
      for (let x = playableViewport.x; x <= playableViewport.x + playableViewport.w; x += 64) {
        ctx.beginPath(); ctx.moveTo(x, playableViewport.y); ctx.lineTo(x, playableViewport.y + playableViewport.h); ctx.stroke();
      }
      for (let y = playableViewport.y; y <= playableViewport.y + playableViewport.h; y += 64) {
        ctx.beginPath(); ctx.moveTo(playableViewport.x, y); ctx.lineTo(playableViewport.x + playableViewport.w, y); ctx.stroke();
      }

      state.projected = [];
      if (!bounds) {
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.font = "14px Arial";
        ctx.fillText("No usable world_position/map bounds in this frame.", 16, 24);
        return;
      }

      for (const p of players) {
        const w = p.world_position;
        const wp = projectWorld(w, frame);
        if (!wp) continue;
        const x = playableViewport.x + project(wp.x, bounds.xMin, bounds.xMax, playableViewport.w);
        const y = playableViewport.y + project(wp.y, bounds.yMin, bounds.yMax, playableViewport.h);
        const axis = String(p.team || "").toLowerCase().includes("axis");
        const color = axis ? playerColors.axis : playerColors.allies;
        const isTank = Boolean(p.is_tank_role) || isTankRole(p.role);
        ctx.beginPath();
        ctx.arc(x, y, isTank ? 6.5 : 5, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        if (isTank) {
          ctx.beginPath();
          ctx.arc(x, y, 9, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(255, 215, 0, 0.85)";
          ctx.lineWidth = 1.6;
          ctx.stroke();
        }
        if (p.is_squad_leader) {
          const initial = getSquadInitial(p.squad);
          if (initial) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
            ctx.font = "bold 10px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(initial, x, y);
          }
        }
        state.projected.push({ x, y, p });
      }
    }

    function renderRoster(frame) {
      const players = [...(frame.players || [])].sort((a, b) => (Number(b.kills || 0) - Number(a.kills || 0)));
      $("roster").innerHTML = players.map(p => {
        const teamClass = String(p.team || "").toLowerCase().includes("axis") ? "team-axis" : "team-allies";
        return `<div class="roster-item">
          <span class="${teamClass}">${p.name || "Unknown"} <span class="tag">(${p.role || "role?"})</span></span>
          <span class="tag">${p.kills || 0} / ${p.deaths || 0}</span>
        </div>`;
      }).join("");
    }

    function applyFrame(frame, prevOverride = null) {
      const prev = prevOverride !== null ? prevOverride : state.lastFrame;
      addEvents(diffEvents(prev, frame));
      resolveMapVisual(frame);
      drawFrame(frame);
      renderRoster(frame);
      state.lastFrame = frame;
    }

    async function pollLive() {
      try {
        const j = await api("/api/live");
        applyFrame(j.frame);
      } catch (e) {
        setStatus(`Live error: ${e.message}`);
      }
    }

    function stopLiveLoop() {
      if (state.liveTimer) clearInterval(state.liveTimer);
      state.liveTimer = null;
    }

    function startLiveLoop() {
      stopLiveLoop();
      const ms = Math.max(500, Number($("pollMs").value || 2000));
      state.liveTimer = setInterval(pollLive, ms);
    }

    async function refreshReplays() {
      const j = await api("/api/replays");
      const sel = $("replaySelect");
      const list = j.replays || [];
      sel.innerHTML = list.length
        ? list.map(r => `<option value="${r.id}">${r.id} (${r.frames} frames)</option>`).join("")
        : `<option value="">No recordings yet</option>`;
    }

    function setMode(mode) {
      state.mode = mode;
      $("modeLabel").textContent = `Mode: ${mode.toUpperCase()}`;
      if (mode === "live") {
        if (state.replayTimer) clearInterval(state.replayTimer);
        state.replayTimer = null;
        startLiveLoop();
      } else {
        stopLiveLoop();
      }
    }

    async function loadReplay() {
      const id = $("replaySelect").value;
      if (!id) return;
      const j = await api(`/api/replay?id=${encodeURIComponent(id)}`);
      state.replayFrames = j.frames || [];
      state.replayIndex = 0;
      $("timeline").max = Math.max(0, state.replayFrames.length - 1);
      $("timeline").value = 0;
      state.events = [];
      if (state.replayFrames.length) applyFrame(state.replayFrames[0], null);
      setMode("replay");
      setStatus(`Replay loaded: ${id}`);
    }

    function showReplayIndex(i) {
      if (!state.replayFrames.length) return;
      const idx = Math.max(0, Math.min(state.replayFrames.length - 1, i));
      state.replayIndex = idx;
      $("timeline").value = idx;
      const prev = idx > 0 ? state.replayFrames[idx - 1] : null;
      applyFrame(state.replayFrames[idx], prev);
    }

    function playReplay() {
      if (!state.replayFrames.length) return;
      if (state.replayTimer) clearInterval(state.replayTimer);
      state.replayTimer = setInterval(() => {
        const next = state.replayIndex + 1;
        if (next >= state.replayFrames.length) {
          clearInterval(state.replayTimer);
          state.replayTimer = null;
          return;
        }
        showReplayIndex(next);
      }, 500);
    }

    function pauseReplay() {
      if (state.replayTimer) clearInterval(state.replayTimer);
      state.replayTimer = null;
    }

    function bindCanvasHover() {
      const canvas = $("mapCanvas");
      canvas.addEventListener("mousemove", (ev) => {
        const rect = canvas.getBoundingClientRect();
        const mx = ev.clientX - rect.left;
        const my = ev.clientY - rect.top;
        let best = null;
        let bestDist = 9999;
        for (const node of state.projected) {
          const dx = node.x - mx;
          const dy = node.y - my;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < bestDist) { bestDist = d; best = node; }
        }
        if (!best || bestDist > 12) {
          $("hoverName").textContent = "Hover a player dot";
          $("hoverMeta").textContent = "Role / Team / Squad / K:D";
          return;
        }
        const p = best.p;
        $("hoverName").textContent = p.name || "Unknown";
        const tags = [];
        if (p.is_squad_leader) tags.push("SL");
        if (p.is_tank_role || isTankRole(p.role)) tags.push("TANK");
        const tagTxt = tags.length ? ` · ${tags.join("/")}` : "";
        $("hoverMeta").textContent = `${p.role || "role?"} · ${p.team || "team?"} · ${p.squad || "squad?"}${tagTxt} · K:${p.kills || 0} D:${p.deaths || 0}`;
      });
    }

    function bindCanvasZoom() {
      const canvas = $("mapCanvas");
      canvas.addEventListener("wheel", (ev) => {
        ev.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mx = ev.clientX - rect.left;
        const my = ev.clientY - rect.top;
        const xNorm = rect.width > 0 ? (mx / rect.width) : 0.5;
        const yNorm = rect.height > 0 ? (my / rect.height) : 0.5;
        const z = getZoomState();
        const factor = ev.deltaY < 0 ? 1.12 : (1 / 1.12);
        const nextScale = Math.max(1, Math.min(3, z.scale * factor));
        setZoomState({ scale: nextScale, centerXNorm: xNorm, centerYNorm: yNorm });
        if (state.frame) drawFrame(state.frame);
      }, { passive: false });

      canvas.addEventListener("dblclick", () => {
        setZoomState({ scale: 1, centerXNorm: 0.5, centerYNorm: 0.5 });
        if (state.frame) drawFrame(state.frame);
      });
    }


    async function init() {
      bindCanvasHover();
      bindCanvasZoom();
      $("saveCfgBtn").onclick = async () => { try { await saveConfig(); } catch (e) { setStatus(e.message); } };
      $("testLiveBtn").onclick = async () => { try { await pollLive(); setStatus("Live fetch OK."); } catch (e) { setStatus(e.message); } };
      $("startRecBtn").onclick = async () => {
        try {
          const j = await api("/api/record/start", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
          $("recStatus").textContent = `Recording: ON (${j.id})`;
          await refreshReplays();
        } catch (e) { setStatus(e.message); }
      };
      $("stopRecBtn").onclick = async () => {
        try {
          await api("/api/record/stop", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
          $("recStatus").textContent = "Recording: OFF";
          await refreshReplays();
        } catch (e) { setStatus(e.message); }
      };
      $("liveModeBtn").onclick = () => setMode("live");
      $("replayModeBtn").onclick = () => setMode("replay");
      $("loadReplayBtn").onclick = async () => { try { await loadReplay(); } catch (e) { setStatus(e.message); } };
      $("playBtn").onclick = playReplay;
      $("pauseBtn").onclick = pauseReplay;
      $("timeline").oninput = (e) => showReplayIndex(Number(e.target.value));

      ["mirrorPlayersX", "mirrorPlayersY", "alliesColor", "axisColor", "flipMapX", "flipMapY"].forEach((id) => {
        const el = $(id);
        if (!el) return;
        el.addEventListener("change", () => {
          if (!state.frame) return;
          state.frame.player_view = getPlayerViewFromInputs();
          state.frame.player_colors = getPlayerColorsFromInputs();
          state.frame.map_view = getMapViewFromInputs();
          drawFrame(state.frame);
        });
      });

      await loadConfig();
      await refreshReplays();
      setMode("live");
      pollLive();
    }

    init().catch(e => setStatus(e.message));
  </script>
</body>
</html>
